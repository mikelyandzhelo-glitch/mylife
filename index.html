<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Моя Жизнь">
    <meta name="theme-color" content="#0a0a1a">
    <title>Моя Жизнь</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --bg: #0a0a1a;
            --bg2: #111128;
            --card: #161638;
            --card-hover: #1c1c48;
            --text: #e8e8f0;
            --text2: #8888aa;
            --muted: #555577;
            --accent: #ff3366;
            --accent2: #ff6699;
            --green: #00e676;
            --yellow: #ffd740;
            --blue: #448aff;
            --purple: #b388ff;
            --orange: #ff9100;
            --cyan: #18ffff;
            --border: rgba(255,255,255,0.05);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }
        .app {
            max-width: 480px; margin: 0 auto;
            min-height: 100vh; min-height: 100dvh;
            padding-bottom: calc(66px + var(--safe-bottom));
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(255,51,102,0.2)} 50%{box-shadow:0 0 40px rgba(255,51,102,0.4)} }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        @keyframes confettiFall { 0%{transform:translateY(-100vh) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
        @keyframes xpGain { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(1.5)} }
        @keyframes levelUp { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        @keyframes breathe { 0%,100%{opacity:0.6} 50%{opacity:1} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes ripple { to{transform:scale(2);opacity:0} }

        .page { display:none; padding:6px 18px 18px; animation: fadeUp 0.35s ease; }
        .page.active { display:block; }

        /* ===== HEADER ===== */
        .app-header {
            padding: 12px 18px 8px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,26,0.92);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .header-row h1 {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-date { font-size: 11px; color: var(--text2); margin-top: 1px; }
        .header-btn {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--card);
            color: var(--text2); font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s;
        }
        .header-btn:active { transform: scale(0.9); }

        /* ===== XP BAR ===== */
        .xp-bar-container {
            margin-top: 8px; display: flex; align-items: center; gap: 8px;
        }
        .xp-level {
            background: linear-gradient(135deg, var(--accent), var(--orange));
            color: white; font-size: 11px; font-weight: 800;
            padding: 3px 8px; border-radius: 6px; white-space: nowrap;
            min-width: 42px; text-align: center;
        }
        .xp-bar {
            flex: 1; height: 6px; background: var(--card);
            border-radius: 3px; overflow: hidden;
        }
        .xp-bar-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), var(--orange));
            transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }
        .xp-bar-fill::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        .xp-text { font-size: 10px; color: var(--muted); white-space: nowrap; }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: rgba(10,10,26,0.95);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around;
            padding: 5px 0; padding-bottom: calc(5px + var(--safe-bottom));
            z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 1px;
            padding: 4px 6px; border: none; background: none;
            color: var(--muted); font-size: 9px; font-family: inherit;
            cursor: pointer; border-radius: 8px; transition: all 0.2s; min-width: 50px;
        }
        .nav-icon { font-size: 20px; line-height: 1; transition: transform 0.2s; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active .nav-icon { transform: scale(1.15); }

        /* ===== SECTION TITLE ===== */
        .stitle {
            font-size: 15px; font-weight: 700; margin: 16px 0 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .stitle .see-all { margin-left:auto; font-size:11px; color:var(--accent); font-weight:500; cursor:pointer; }

        /* ===== CARD ===== */
        .card {
            background: var(--card); border-radius: 14px; padding: 14px;
            margin-bottom: 8px; border: 1px solid var(--border);
            transition: all 0.15s; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .card:active { transform: scale(0.98); background: var(--card-hover); }
        .card::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at var(--ripple-x,50%) var(--ripple-y,50%), rgba(255,255,255,0.08), transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        .card:active::after { opacity: 1; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .card-sub { font-size: 12px; color: var(--text2); line-height: 1.4; }

        /* ===== ADD BTN ===== */
        .add-btn {
            width: 100%; padding: 11px; border-radius: 12px;
            border: 2px dashed rgba(255,51,102,0.2); background: transparent;
            color: var(--accent); font-size: 13px; font-weight: 500;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all 0.2s;
        }
        .add-btn:active { background: rgba(255,51,102,0.06); transform: scale(0.98); }

        /* ===== QUOTE WIDGET ===== */
        .quote-w {
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1048 50%, #1a0a2e 100%);
            border-radius: 16px; padding: 16px; margin-bottom: 10px;
            border: 1px solid rgba(179,136,255,0.15);
            position: relative; overflow: hidden;
        }
        .quote-w::before {
            content: ''; position: absolute; top:-50%; right:-30%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(179,136,255,0.1), transparent);
            pointer-events: none;
        }
        .quote-w .qt { font-size: 13px; font-weight: 500; line-height: 1.5; font-style: italic; position:relative; }
        .quote-w .qa { font-size: 11px; color: var(--purple); margin-top: 6px; font-weight: 600; }
        .quote-w .qr {
            position:absolute; top:10px; right:10px;
            background: rgba(255,255,255,0.06); border:none; border-radius:8px;
            width:28px; height:28px; cursor:pointer; font-size:14px;
            display:flex; align-items:center; justify-content:center; color:var(--text2);
        }

        /* ===== STATS ===== */
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
        .stat-card {
            background: var(--card); border-radius: 12px; padding: 10px;
            border: 1px solid var(--border); text-align: center;
            position: relative; overflow: hidden;
        }
        .stat-val { font-size: 22px; font-weight: 800; }
        .stat-lbl { font-size: 9px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ===== CATEGORY TAGS ===== */
        .ctag { display:inline-block; padding:2px 7px; border-radius:5px; font-size:9px; font-weight:700; letter-spacing:0.3px; }
        .ct-health { background:rgba(0,230,118,0.12); color:var(--green); }
        .ct-finance { background:rgba(255,215,64,0.12); color:var(--yellow); }
        .ct-relationship { background:rgba(255,51,102,0.12); color:var(--accent); }
        .ct-career { background:rgba(68,138,255,0.12); color:var(--blue); }
        .ct-growth { background:rgba(179,136,255,0.12); color:var(--purple); }
        .ct-other { background:rgba(255,255,255,0.06); color:var(--text2); }

        /* ===== GOAL PROGRESS ===== */
        .gprog { width:100%; height:5px; background:var(--bg); border-radius:3px; margin-top:8px; overflow:hidden; }
        .gprog-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 0.6s ease; }
        .gmeta { display:flex; justify-content:space-between; margin-top:3px; font-size:10px; color:var(--muted); }

        /* ===== HABIT ITEMS ===== */
        .habit-item {
            display:flex; align-items:center; gap:10px;
            padding:11px; background:var(--card); border-radius:12px;
            border:1px solid var(--border); margin-bottom:5px;
            transition: all 0.15s;
        }
        .habit-item:active { transform: scale(0.98); }
        .hcheck {
            width:28px; height:28px; border-radius:50%;
            border:2px solid var(--muted);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.25s; flex-shrink:0; font-size:13px;
        }
        .hcheck.done {
            background:var(--green); border-color:var(--green); color:var(--bg);
            animation: pulse 0.3s ease;
        }
        .hname { flex:1; font-size:13px; font-weight:500; }
        .hstreak { font-size:10px; color:var(--yellow); font-weight:700; }
        .hxp { font-size:9px; color:var(--cyan); font-weight:600; }

        /* ===== AFFIRMATION ===== */
        .aff-card {
            background: linear-gradient(135deg, #16082e, #240e42);
            border-radius: 14px; padding: 14px; margin-bottom: 6px;
            border: 1px solid rgba(179,136,255,0.12);
            position: relative; overflow: hidden;
        }
        .aff-card::before {
            content:''; position:absolute; top:-50%; right:-50%; width:100%; height:100%;
            background:radial-gradient(circle,rgba(179,136,255,0.06),transparent); pointer-events:none;
        }
        .aff-text { font-size:13px; font-weight:500; line-height:1.5; position:relative; padding-left:12px; }
        .aff-text::before { content:'\201C'; font-size:28px; color:var(--purple); position:absolute; top:-6px; left:-2px; opacity:0.4; }
        .aff-actions { display:flex; gap:5px; margin-top:8px; position:relative; }
        .aff-actions button {
            padding:4px 9px; border-radius:6px; border:none;
            font-size:10px; font-family:inherit; cursor:pointer;
            background:rgba(255,255,255,0.05); color:var(--text2);
        }

        /* ===== ROUTINE ===== */
        .rut-item {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; background:var(--card); border-radius:12px;
            margin-bottom:5px; border:1px solid var(--border);
        }
        .rut-time { font-size:12px; font-weight:700; min-width:44px; }
        .rut-time.morning { color: var(--yellow); }
        .rut-time.day { color: var(--orange); }
        .rut-time.evening { color: var(--purple); }
        .rut-time.night { color: var(--blue); }
        .rut-desc { flex:1; font-size:13px; }
        .rut-toggle {
            width:40px; height:24px; border-radius:12px;
            background:var(--muted); position:relative;
            cursor:pointer; transition:background 0.2s; flex-shrink:0;
        }
        .rut-toggle.on { background:var(--green); }
        .rut-toggle::after {
            content:''; position:absolute; width:20px; height:20px;
            border-radius:50%; background:white; top:2px; left:2px;
            transition:transform 0.2s;
        }
        .rut-toggle.on::after { transform:translateX(16px); }

        /* ===== REMINDER ===== */
        .rem-item {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; background:var(--card); border-radius:12px;
            margin-bottom:5px; border:1px solid var(--border);
        }
        .rem-bell { font-size:16px; }
        .rem-info { flex:1; }
        .rem-title { font-size:13px; font-weight:500; }
        .rem-time { font-size:10px; color:var(--muted); }

        /* ===== JOURNAL ===== */
        .journ-entry {
            padding:11px; background:var(--card); border-radius:12px;
            margin-bottom:6px; border:1px solid var(--border);
        }
        .journ-date { font-size:10px; color:var(--muted); margin-bottom:3px; }
        .journ-text { font-size:13px; line-height:1.4; color:var(--text2); }

        /* ===== REVIEW MODAL ===== */
        .review-header {
            text-align: center; padding: 10px 0 16px;
        }
        .review-header .emoji { font-size: 48px; margin-bottom: 8px; }
        .review-header h2 { font-size: 20px; font-weight: 700; }
        .review-header p { font-size: 13px; color: var(--text2); margin-top: 4px; }
        .review-section { margin-bottom: 14px; }
        .review-section label {
            display: block; font-size: 12px; color: var(--text2);
            margin-bottom: 5px; font-weight: 600;
        }
        .review-section textarea {
            width:100%; padding:10px 12px; border-radius:10px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); font-size:13px; font-family:inherit;
            outline:none; min-height:60px; resize:none;
        }
        .review-section textarea:focus { border-color: var(--accent); }
        .review-section input[type="text"] {
            width:100%; padding:10px 12px; border-radius:10px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); font-size:13px; font-family:inherit; outline:none;
        }

        /* ===== ANALYTICS ===== */
        .aperiod { display:flex; gap:5px; margin-bottom:12px; }
        .aperiod-btn {
            flex:1; padding:7px; border-radius:8px; border:1px solid var(--border);
            background:var(--card); color:var(--text2);
            font-size:11px; font-weight:600; font-family:inherit; cursor:pointer;
            transition:all 0.15s;
        }
        .aperiod-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
        .achart { margin-bottom:14px; }
        .achart-title { font-size:12px; font-weight:600; margin-bottom:6px; color:var(--text2); }
        .abars { display:flex; align-items:flex-end; gap:3px; height:80px; }
        .abar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
        .abar {
            width:100%; border-radius:3px 3px 0 0;
            background:linear-gradient(to top, var(--accent), var(--accent2));
            min-height:3px; transition:height 0.6s ease;
        }
        .abar-val { font-size:8px; color:var(--text2); font-weight:600; }
        .abar-lbl { font-size:8px; color:var(--muted); }
        .acard {
            background:var(--card); border-radius:12px; padding:12px;
            border:1px solid var(--border); margin-bottom:8px;
        }
        .arow {
            display:flex; justify-content:space-between; align-items:center;
            padding:6px 0; border-bottom:1px solid var(--border);
        }
        .arow:last-child { border-bottom:none; }
        .arow-l { font-size:12px; color:var(--text2); }
        .arow-v { font-size:13px; font-weight:700; }

        /* ===== MODAL ===== */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.65); z-index:2000;
            justify-content:center; align-items:flex-end;
        }
        .modal-overlay.active { display:flex; animation: fadeIn 0.2s ease; }
        .modal {
            background:var(--bg2); border-radius:20px 20px 0 0;
            padding:14px; padding-bottom:calc(14px + var(--safe-bottom));
            width:100%; max-width:480px; max-height:88vh;
            overflow-y:auto; animation:slideUp 0.3s ease;
        }
        .mhandle { width:36px; height:4px; background:var(--muted); border-radius:2px; margin:0 auto 12px; }
        .modal h2 { font-size:17px; font-weight:700; margin-bottom:12px; }
        .fg { margin-bottom:10px; }
        .fg label { display:block; font-size:11px; color:var(--text2); margin-bottom:4px; font-weight:600; }
        .fg input, .fg textarea, .fg select {
            width:100%; padding:10px 12px; border-radius:10px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); font-size:14px; font-family:inherit;
            outline:none; transition:border 0.2s;
        }
        .fg input:focus, .fg textarea:focus { border-color:var(--accent); }
        .fg textarea { min-height:64px; resize:vertical; }
        .mactions { display:flex; gap:8px; margin-top:12px; }
        .btn {
            flex:1; padding:12px; border-radius:10px; border:none;
            font-size:14px; font-weight:600; font-family:inherit; cursor:pointer;
            transition:all 0.15s;
        }
        .btn:active { transform:scale(0.97); }
        .btn-p { background:var(--accent); color:white; }
        .btn-s { background:var(--card); color:var(--text2); }
        .btn-d { background:rgba(255,51,102,0.1); color:var(--accent); }

        /* ===== SETTINGS ITEM ===== */
        .sitem {
            display:flex; align-items:center; gap:10px;
            padding:12px; background:var(--card); border-radius:10px;
            margin-bottom:5px; border:1px solid var(--border); cursor:pointer;
            transition:all 0.15s;
        }
        .sitem:active { transform:scale(0.98); }
        .sicon { font-size:20px; }
        .slabel { flex:1; font-size:13px; font-weight:500; }
        .shint { font-size:10px; color:var(--muted); }

        /* ===== EMPTY ===== */
        .empty { text-align:center; padding:24px 14px; color:var(--muted); }
        .empty .e { font-size:36px; margin-bottom:8px; }
        .empty p { font-size:12px; line-height:1.4; }

        /* ===== CONFETTI ===== */
        .confetti-piece {
            position:fixed; width:8px; height:8px; border-radius:2px;
            z-index:9999; pointer-events:none;
            animation: confettiFall 2.5s ease-in forwards;
        }

        /* ===== XP POPUP ===== */
        .xp-popup {
            position:fixed; z-index:9998; pointer-events:none;
            font-size:16px; font-weight:800; color:var(--cyan);
            animation: xpGain 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(24,255,255,0.5);
        }

        /* ===== LEVEL UP OVERLAY ===== */
        .levelup-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.8); z-index:10000;
            justify-content:center; align-items:center;
            flex-direction: column;
        }
        .levelup-overlay.show { display:flex; animation:fadeIn 0.3s ease; }
        .levelup-text {
            font-size: 48px; font-weight: 900;
            background: linear-gradient(135deg, var(--yellow), var(--orange), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: levelUp 0.6s ease;
        }
        .levelup-sub { font-size:16px; color:var(--text2); margin-top:8px; animation:fadeUp 0.6s ease 0.3s both; }
        .levelup-close {
            margin-top:20px; padding:12px 40px; border-radius:12px;
            border:none; background:var(--accent); color:white;
            font-size:14px; font-weight:600; font-family:inherit; cursor:pointer;
            animation:fadeUp 0.6s ease 0.5s both;
        }

        /* ===== DAILY BONUS ===== */
        .daily-bonus {
            background: linear-gradient(135deg, #1a0a0a, #2a1010);
            border: 1px solid rgba(255,51,102,0.2);
            border-radius: 14px; padding: 12px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: all 0.15s;
        }
        .daily-bonus:active { transform: scale(0.98); }
        .daily-bonus .db-icon { font-size: 28px; animation: pulse 2s infinite; }
        .daily-bonus .db-text { flex:1; }
        .daily-bonus .db-title { font-size:13px; font-weight:600; color:var(--accent); }
        .daily-bonus .db-sub { font-size:11px; color:var(--text2); }
        .daily-bonus .db-claim {
            padding:6px 14px; border-radius:8px; border:none;
            background:var(--accent); color:white; font-size:11px;
            font-weight:700; font-family:inherit; cursor:pointer;
        }
        .daily-bonus .db-claim.claimed {
            background: rgba(0,230,118,0.15); color:var(--green);
        }

        /* ===== STEPS ===== */
        .steps-list { margin-top:5px; }
        .step-item {
            display:flex; align-items:center; gap:7px;
            padding:6px 0; border-bottom:1px solid var(--border); font-size:12px;
        }
        .step-item:last-child { border-bottom:none; }
        .scheck {
            width:20px; height:20px; border-radius:5px;
            border:2px solid var(--muted);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.2s; flex-shrink:0; font-size:10px;
        }
        .scheck.done { background:var(--green); border-color:var(--green); color:var(--bg); }
        .stext { flex:1; }
        .stext.done-t { text-decoration:line-through; opacity:0.4; }
        .sdel { color:var(--muted); cursor:pointer; font-size:13px; }
        .qadd { display:flex; gap:5px; margin-top:5px; }
        .qadd input {
            flex:1; padding:7px 10px; border-radius:7px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); font-size:12px; font-family:inherit; outline:none;
        }
        .qadd input:focus { border-color:var(--accent); }
        .qadd button {
            padding:7px 12px; border-radius:7px; border:none;
            background:var(--accent); color:white; font-size:12px; font-family:inherit; cursor:pointer;
        }

        /* ===== ACHIEVEMENTS ===== */
        .ach-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin-bottom:12px; }
        .ach-item {
            text-align:center; padding:10px 4px; border-radius:10px;
            background:var(--card); border:1px solid var(--border);
            transition: all 0.2s;
        }
        .ach-item.locked { opacity:0.3; }
        .ach-item.unlocked { border-color: rgba(255,215,64,0.3); background: rgba(255,215,64,0.05); }
        .ach-item .ach-icon { font-size:24px; margin-bottom:2px; }
        .ach-item .ach-name { font-size:8px; color:var(--text2); line-height:1.2; }

        .del-btn {
            padding:3px 8px; border-radius:5px; border:none;
            background:rgba(255,51,102,0.1); color:var(--accent);
            font-size:10px; font-family:inherit; cursor:pointer;
        }

        /* ===== OVERVIEW QUOTE ===== */
        .ov-quote {
            font-style:italic; color:var(--text2); font-size:12px;
            padding:10px; background:var(--card); border-radius:10px;
            border-left:3px solid var(--purple); margin-bottom:8px; line-height:1.4;
        }

        /* ===== NOTIF BANNER ===== */
        .notif {
            position:fixed; top:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:480px;
            padding:14px; padding-top:calc(10px + env(safe-area-inset-top, 0px));
            background:linear-gradient(135deg, var(--accent), #cc2244);
            color:white; z-index:3000; display:none;
            text-align:center; font-size:13px; font-weight:600;
        }
        .notif.show { display:block; animation:fadeUp 0.3s ease; }

        ::-webkit-scrollbar { width:0; }
    </style>
</head>

<script>
// ===== QUOTES =====

    {t:"Сегодня — самый лучший день, чтобы начать.",a:"Неизвестный"},
];

// ===== ACHIEVEMENTS =====
const ACHIEVEMENTS = [
    {id:'first_goal', icon:'🎯', name:'Первая цель', desc:'Создай первую цель'},
    {id:'first_habit', icon:'✅', name:'Первая привычка', desc:'Добавь первую привычку'},
    {id:'first_aff', icon:'🧠', name:'Программист', desc:'Напиши первую установку'},
    {id:'first_journal', icon:'📔', name:'Дневник', desc:'Запиши первую мысль'},
    {id:'first_routine', icon:'📅', name:'Режим', desc:'Создай распорядок дня'},
    {id:'streak3', icon:'🔥', name:'3 дня подряд', desc:'Серия привычек 3+ дня'},
    {id:'streak7', icon:'⚡', name:'Неделя!', desc:'Серия привычек 7+ дней'},
    {id:'streak30', icon:'💎', name:'Месяц!', desc:'Серия привычек 30+ дней'},
    {id:'goals5', icon:'🏆', name:'Целеустремлённый', desc:'Создай 5 целей'},
    {id:'journal10', icon:'✍️', name:'Писатель', desc:'10 записей в дневнике'},
    {id:'xp100', icon:'⭐', name:'100 XP', desc:'Набери 100 очков'},
    {id:'xp500', icon:'🌟', name:'500 XP', desc:'Набери 500 очков'},
];

// ===== XP SYSTEM =====
const XP_PER = {habit:15, step:10, journal:20, routine:5, goal:25, affirmation:10, review:30, dailyBonus:50};
const XP_LEVEL = [0,50,120,220,350,520,730,1000,1350,1800,2400,3200,4200,5500,7000,9000,11500,14500,18000,22000,27000];

function getXPData() {
    try { const r=localStorage.getItem('mylife_xp'); if(r) return JSON.parse(r); } catch(e){}
    return {total:0, today:0, lastDate:'', achievements:[], dailyBonusDate:''};
}
function saveXPData(x) { localStorage.setItem('mylife_xp', JSON.stringify(x)); }
let xpData = getXPData();

function getLevel(total) {
    let lvl=1;
    for(let i=0;i<XP_LEVEL.length;i++) { if(total>=XP_LEVEL[i]) lvl=i+1; }
    return lvl;
}
function getLevelProgress(total) {
    const lvl = getLevel(total);
    const curr = XP_LEVEL[lvl-1]||0;
    const next = XP_LEVEL[lvl]||XP_LEVEL[XP_LEVEL.length-1]+5000;
    return {level:lvl, curr: total-curr, need: next-curr, pct: Math.round((total-curr)/(next-curr)*100)};
}

function addXP(amount, x, y) {
    const oldLvl = getLevel(xpData.total);
    xpData.total += amount;
    const today = getToday();
    if(xpData.lastDate !== today) { xpData.today = 0; xpData.lastDate = today; }
    xpData.today += amount;
    saveXPData(xpData);
    renderXPBar();
    showXPPopup(amount, x, y);
    const newLvl = getLevel(xpData.total);
    if(newLvl > oldLvl) {
        setTimeout(()=> showLevelUp(newLvl), 800);
    }
    checkAchievements();
}

function renderXPBar() {
    const p = getLevelProgress(xpData.total);
    document.getElementById('xpLevel').textContent = 'Ур.' + p.level;
    document.getElementById('xpBarFill').style.width = p.pct + '%';
    document.getElementById('xpText').textContent = xpData.total + ' XP';
}

function showXPPopup(amount, x, y) {
    const el = document.createElement('div');
    el.className = 'xp-popup';
    el.textContent = '+' + amount + ' XP';
    el.style.left = (x||window.innerWidth/2) + 'px';
    el.style.top = (y||200) + 'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1200);
}

function showLevelUp(level) {
    document.getElementById('levelupText').textContent = 'УРОВЕНЬ ' + level + '!';
    const msgs = ['Ты становишься сильнее 💪','Дисциплина — твоя суперсила ⚡','Новая высота! 🏔️','Растешь на глазах! 🚀','Невероятно! 🔥','Неудержимый! 💎'];
    document.getElementById('levelupSub').textContent = msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('levelupOverlay').classList.add('show');
    spawnConfetti();
}

function spawnConfetti() {
    const colors = ['#ff3366','#00e676','#ffd740','#448aff','#b388ff','#ff9100','#18ffff'];
    for(let i=0;i<40;i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random()*100 + 'vw';
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDelay = Math.random()*0.5 + 's';
        c.style.animationDuration = (2+Math.random()*1.5) + 's';
        c.style.width = (5+Math.random()*8)+'px';
        c.style.height = (5+Math.random()*8)+'px';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 4000);
    }
}

function checkAchievements() {
    const u = xpData.achievements;
    function unlock(id) { if(!u.includes(id)){u.push(id);saveXPData(xpData);showNotif('🏆 Достижение разблокировано!');} }
    if(appData.goals.length>=1) unlock('first_goal');
    if(appData.habits.length>=1) unlock('first_habit');
    if(appData.affirmations.length>=1) unlock('first_aff');
    if(appData.journal.length>=1) unlock('first_journal');
    if(appData.routine.length>=1) unlock('first_routine');
    if(appData.goals.length>=5) unlock('goals5');
    if(appData.journal.length>=10) unlock('journal10');
    if(xpData.total>=100) unlock('xp100');
    if(xpData.total>=500) unlock('xp500');
    let maxStreak=0;
    appData.habits.forEach(h=>{
        let s=0;if(h.doneDates&&h.doneDates.length){const sorted=[...h.doneDates].sort().reverse();const d=new Date();
        for(let i=0;i<365;i++){const ds=d.toISOString().split('T')[0];if(sorted.includes(ds)){s++;d.setDate(d.getDate()-1);}else{if(i===0){d.setDate(d.getDate()-1);continue;}break;}}
        maxStreak=Math.max(maxStreak,s);}
    });
    if(maxStreak>=3) unlock('streak3');
    if(maxStreak>=7) unlock('streak7');
    if(maxStreak>=30) unlock('streak30');
}

// ===== DATA =====
const DB='mylife_app_data';
function load(){try{const r=localStorage.getItem(DB);if(r)return JSON.parse(r);}catch(e){}return{goals:[],habits:[],affirmations:[],journal:[],routine:[],reminders:[]};}
function save(d){localStorage.setItem(DB,JSON.stringify(d));}
let D=load();if(!D.reminders)D.reminders=[];

function getToday(){return new Date().toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function fmtDate(ds){const d=new Date(ds);const days=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];const m=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];return`${days[d.getDay()]}, ${d.getDate()} ${m[d.getMonth()]}`;}
function fmtFull(ds){const d=new Date(ds);const days=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];return`${days[d.getDay()]}, ${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;}
function dayLabel(ds){if(ds===getToday())return'Сегодня';const y=new Date(Date.now()-864e5).toISOString().split('T')[0];if(ds===y)return'Вчера';return fmtDate(ds);}
function catLabel(c){return{health:'💪 Здоровье',finance:'💰 Финансы',relationship:'❤️ Отношения',career:'💼 Карьера',growth:'📚 Развитие',other:'📌 Другое'}[c]||'📌 Другое';}
function getStreak(h){let s=0;if(!h.doneDates||!h.doneDates.length)return 0;const sorted=[...h.doneDates].sort().reverse();const d=new Date();for(let i=0;i<365;i++){const ds=d.toISOString().split('T')[0];if(sorted.includes(ds)){s++;d.setDate(d.getDate()-1);}else{if(i===0){d.setDate(d.getDate()-1);continue;}break;}}return s;}
function getTimeClass(t){if(!t)return'';const h=parseInt(t);if(h>=5&&h<12)return'morning';if(h>=12&&h<17)return'day';if(h>=17&&h<21)return'evening';return'night';}

// ===== NAV =====
function switchPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));document.querySelector(`.nav-item[data-page="${p}"]`).classList.add('active');renderAll();}
document.getElementById('hDate').textContent=fmtFull(getToday());

// ===== MODAL =====
function openM(h){document.getElementById('mBody').innerHTML=h;document.getElementById('mOverlay').classList.add('active');}
function closeModal(e){if(e&&e.target!==document.getElementById('mOverlay'))return;document.getElementById('mOverlay').classList.remove('active');}
function closeM(){document.getElementById('mOverlay').classList.remove('active');}
function showNotif(t){const b=document.getElementById('notif');b.textContent=t;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2500);}

// ===== RENDER HOME =====
function renderHome(){
    const today=getToday();
    const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);
    const q=QUOTES[doy%QUOTES.length];
    const tJ=D.journal.filter(j=>j.date===today);
    const hToday=D.habits.filter(h=>h.doneDates&&h.doneDates.includes(today)).length;
    const hTotal=D.habits.length;
    const cSteps=D.goals.reduce((a,g)=>a+(g.steps||[]).filter(s=>s.done).length,0);
    const tSteps=D.goals.reduce((a,g)=>a+(g.steps||[]).length,0);
    const rut=[...D.routine].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const rutDone=rut.filter(r=>r.doneDates&&r.doneDates.includes(today)).length;
    let dAff='';if(D.affirmations.length)dAff=D.affirmations[doy%D.affirmations.length].text;
    const totalI=hTotal+rut.length;const doneI=hToday+rutDone;const pct=totalI>0?Math.round(doneI/totalI*100):0;
    const dailyClaimed=xpData.dailyBonusDate===today;

    let h=`
    <div class="quote-w">
        <button class="qr" onclick="refreshQ()">🔄</button>
        <div class="qt" id="hQuote">${q.t}</div>
        <div class="qa">— ${q.a}</div>
    </div>`;

    // Daily bonus
    if(!dailyClaimed) {
        h+=`<div class="daily-bonus" onclick="claimDailyBonus(event)">
            <div class="db-icon">🎁</div>
            <div class="db-text"><div class="db-title">Ежедневный бонус!</div><div class="db-sub">Забери +${XP_PER.dailyBonus} XP за новый день</div></div>
            <button class="db-claim">Забрать</button>
        </div>`;
    }

    h+=`<div class="stats-grid">
        <div class="stat-card"><div class="stat-val" style="color:var(--green)">${hToday}/${hTotal}</div><div class="stat-lbl">Привычки</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${cSteps}/${tSteps}</div><div class="stat-lbl">Шаги</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${rutDone}/${rut.length}</div><div class="stat-lbl">Режим</div></div>

// ===== RENDER ANALYTICS =====
let aPeriod='week';
function setPeriod(p,b){aPeriod=p;document.querySelectorAll('.aperiod-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderAnalytics();}

function renderAnalytics(){
    const el=document.getElementById('analyticsContent');
    const days=aPeriod==='week'?7:30;const today=new Date();const dates=[];
    for(let i=days-1;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);dates.push(d.toISOString().split('T')[0]);}

    const habitD=dates.map(d=>({date:d,done:D.habits.filter(h=>h.doneDates&&h.doneDates.includes(d)).length,total:D.habits.length}));
    const hAvg=D.habits.length?Math.round(habitD.reduce((a,d)=>a+d.done,0)/(habitD.length*D.habits.length)*100):0;
    const rutD=dates.map(d=>({date:d,done:D.routine.filter(r=>r.doneDates&&r.doneDates.includes(d)).length,total:D.routine.length}));
    const rAvg=D.routine.length?Math.round(rutD.reduce((a,d)=>a+d.done,0)/(rutD.length*D.routine.length)*100):0;
    const jCount=dates.reduce((a,d)=>a+D.journal.filter(j=>j.date===d).length,0);
    const tS=D.goals.reduce((a,g)=>a+(g.steps||[]).length,0);const dS=D.goals.reduce((a,g)=>a+(g.steps||[]).filter(s=>s.done).length,0);
    const gPct=tS>0?Math.round(dS/tS*100):0;

    const cData=aPeriod==='week'?habitD:habitD.filter((_,i)=>i%Math.ceil(days/7)===0||i===days-1).slice(-7);
    let hChart='';cData.forEach(d=>{const p=d.total>0?(d.done/d.total*100):0;const lbl=aPeriod==='week'?['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][new Date(d.date+'T12:00').getDay()]:fmtDate(d.date);
    hChart+=`<div class="abar-col"><div class="abar-val">${d.done}/${d.total}</div><div class="abar" style="height:${Math.max(p,3)}%"></div><div class="abar-lbl">${lbl}</div></div>`;});

    const rcData=aPeriod==='week'?rutD:rutD.filter((_,i)=>i%Math.ceil(days/7)===0||i===days-1).slice(-7);
    let rChart='';rcData.forEach(d=>{const p=d.total>0?(d.done/d.total*100):0;const lbl=aPeriod==='week'?['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][new Date(d.date+'T12:00').getDay()]:fmtDate(d.date);
    rChart+=`<div class="abar-col"><div class="abar-val">${d.done}/${d.total}</div><div class="abar" style="height:${Math.max(p,3)}%;background:linear-gradient(to top,var(--green),var(--cyan))"></div><div class="abar-lbl">${lbl}</div></div>`;});

    const streaks=D.habits.map(h=>({t:h.title,s:getStreak(h)})).sort((a,b)=>b.s-a.s);

    let h=`<div class="acard"><div style="font-size:13px;font-weight:700;margin-bottom:8px">📋 Прогресс</div>
        <div class="arow"><div class="arow-l">🎯 Цели</div><div class="arow-v" style="color:var(--accent)">${dS}/${tS} (${gPct}%)</div></div>
        <div class="arow"><div class="arow-l">✅ Привычки (ср.)</div><div class="arow-v" style="color:var(--green)">${hAvg}%</div></div>
        <div class="arow"><div class="arow-l">📅 Режим (ср.)</div><div class="arow-v" style="color:var(--blue)">${rAvg}%</div></div>
        <div class="arow"><div class="arow-l">📔 Записей</div><div class="arow-v" style="color:var(--purple)">${jCount}</div></div>
        <div class="arow"><div class="arow-l">⭐ Всего XP</div><div class="arow-v" style="color:var(--cyan)">${xpData.total}</div></div>
    </div>`;

    if(D.habits.length){h+=`<div class="achart"><div class="achart-title">✅ Привычки</div><div class="abars">${hChart}</div></div>`;}
    if(D.routine.length){h+=`<div class="achart"><div class="achart-title">📅 Режим</div><div class="abars">${rChart}</div></div>`;}
    if(streaks.some(x=>x.s>0)){h+=`<div class="acard"><div style="font-size:13px;font-weight:700;margin-bottom:6px">🔥 Серии</div>`;streaks.filter(x=>x.s>0).forEach(x=>{h+=`<div class="arow"><div class="arow-l">${x.t}</div><div class="arow-v" style="color:var(--yellow)">🔥 ${x.s} дн.</div></div>`;});h+=`</div>`;}

    const moods=D.journal.filter(j=>j.mood).map(j=>j.mood);
    if(moods.length){const mc={};moods.forEach(m=>mc[m]=(mc[m]||0)+1);const top=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
    h+=`<div class="acard"><div style="font-size:13px;font-weight:700;margin-bottom:6px">🎭 Настроение</div><div class="arow"><div class="arow-l">Частое</div><div class="arow-v">${top[0]} (×${top[1]})</div></div></div>`;}

    el.innerHTML=h;
}

function saveReview(){
    const today=getToday();const hour=new Date().getHours();const isMorning=hour<14;
    let rd={};
    if(isMorning){rd={grateful:document.getElementById('rvGrateful').value,main:document.getElementById('rvMain').value,affirmation:document.getElementById('rvAff').value};}
    else{rd={good:document.getElementById('rvGood').value,improve:document.getElementById('rvImprove').value,proud:document.getElementById('rvProud').value};}

    const existing=D.journal.find(j=>j.date===today&&j.isReview);
    if(existing){existing.text=isMorning?'🌅 Утренний обзор':'🌙 Вечерний обзор';existing.reviewData=JSON.stringify(rd);}
    else{D.journal.push({id:uid(),text:isMorning?'🌅 Утренний обзор':'🌙 Вечерний обзор',mood:'',date:today,time:new Date().getHours().toString().padStart(2,'0')+':'+new Date().getMinutes().toString().padStart(2,'0'),isReview:true,reviewData:JSON.stringify(rd)});}
    save(D);
    addXP(XP_PER.review, window.innerWidth/2, 200);
    closeM();renderAll();showNotif(isMorning?'🌅 Утро настроено!':'🌙 Вечерний обзор сохранён!');
}

let selMood='';
function openJournModal(){selMood='';openM(`<h2>Записать мысль</h2><div class="fg"><label>Настроение</label><div style="display:flex;gap:6px;font-size:24px;margin-bottom:4px" id="moodP"><span onclick="pickM('😊')" data-m="😊" style="cursor:pointer;opacity:0.4">😊</span><span onclick="pickM('😐')" data-m="😐" style="cursor:pointer;opacity:0.4">😐</span><span onclick="pickM('😔')" data-m="😔" style="cursor:pointer;opacity:0.4">😔</span><span onclick="pickM('🔥')" data-m="🔥" style="cursor:pointer;opacity:0.4">🔥</span><span onclick="pickM('💪')" data-m="💪" style="cursor:pointer;opacity:0.4">💪</span><span onclick="pickM('🤔')" data-m="🤔" style="cursor:pointer;opacity:0.4">🤔</span></div></div><div class="fg"><label>Мысль</label><textarea id="jText" placeholder="Что на уме?"></textarea></div><div class="mactions"><button class="btn btn-s" onclick="closeM()">Отмена</button><button class="btn btn-p" onclick="addJourn()">Записать (+${XP_PER.journal}XP)</button></div>`);}
function pickM(m){selMood=m;document.querySelectorAll('#moodP span').forEach(s=>{s.style.opacity=s.dataset.m===m?'1':'0.4';s.style.transform=s.dataset.m===m?'scale(1.2)':'scale(1)';});}
function addJourn(){const t=document.getElementById('jText').value.trim();if(!t)return;const now=new Date();D.journal.push({id:uid(),text:t,mood:selMood,date:getToday(),time:now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')});selMood='';save(D);closeM();renderAll();addXP(XP_PER.journal,window.innerWidth/2,300);showNotif('📔 Записано!');}
function delJourn(id){D.journal=D.journal.filter(x=>x.id!==id);save(D);renderAll();}

// Routine
function toggleRut(id){const today=getToday(),r=D.routine.find(x=>x.id===id);if(!r.doneDates)r.doneDates=[];const i=r.doneDates.indexOf(today);if(i>=0)r.doneDates.splice(i,1);else{r.doneDates.push(today);addXP(XP_PER.routine,window.innerWidth/2,300);}save(D);renderAll();}

// ===== SETTINGS =====
function openSettings(){openM(`<h2>⚙️ Настройки</h2>
    <div class="sitem" onclick="exportData()"><div class="sicon">💾</div><div><div class="slabel">Экспорт бэкапа</div><div class="shint">Скачать JSON</div></div></div>
    <div class="sitem" onclick="document.getElementById('importFile').click();closeM();"><div class="sicon">📂</div><div><div class="slabel">Импорт данных</div><div class="shint">Восстановить из бэкапа</div></div></div>
    <div class="sitem" onclick="requestNotif()"><div class="sicon">🔔</div><div><div class="slabel">Уведомления</div><div class="shint">Разрешить push</div></div></div>
    <div class="sitem" onclick="closeM();openRutMgr()"><div class="sicon">📅</div><div><div class="slabel">Режим дня</div><div class="shint">Редактировать</div></div></div>
    <div class="sitem" onclick="showAllAchievements()"><div class="sicon">🏆</div><div><div class="slabel">Достижения</div><div class="shint">${(xpData.achievements||[]).length}/${ACHIEVEMENTS.length}</div></div></div>
    <div class="sitem" onclick="if(confirm('Удалить ВСЕ данные?')){localStorage.clear();D=load();xpData=getXPData();renderAll();renderXPBar();closeM();showNotif('🗑 Данные удалены');}"><div class="sicon">🗑</div><div><div class="slabel" style="color:var(--accent)">Сбросить всё</div><div class="shint">Безвозвратно</div></div></div>
    <div style="text-align:center;margin-top:12px;font-size:10px;color:var(--muted)">Моя Жизнь v3.0 ⚡ XP: ${xpData.total}</div>`);}

function exportData(){const b=new Blob([JSON.stringify({appData:D,xpData},null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`mylife_${getToday()}.json`;a.click();URL.revokeObjectURL(u);showNotif('💾 Бэкап скачан!');}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(d.appData){D=d.appData;if(!D.reminders)D.reminders=[];if(d.xpData){xpData=d.xpData;saveXPData(xpData);}save(D);renderAll();renderXPBar();showNotif('📂 Восстановлено!');}else showNotif('❌ Неверный формат');}catch(err){showNotif('❌ Ошибка');}};r.readAsText(f);e.target.value='';}

function openRutMgr(){closeM();const sorted=[...D.routine].sort((a,b)=>(a.time||'').localeCompare(b.time||''));let h='';sorted.forEach(r=>{h+=`<div class="rut-item"><div class="rut-time ${getTimeClass(r.time)}">${r.time||'—'}</div><div class="rut-desc">${r.title}</div><button class="del-btn" onclick="delRut('${r.id}');openRutMgr();">✕</button></div>`;});
setTimeout(()=>{openM(`<h2>📅 Режим дня</h2><div id="rutMgr">${h||'<div class="empty" style="padding:12px"><p>Пусто</p></div>'}</div><div style="margin-top:8px"><div class="fg"><label>Время</label><input type="time" id="nrTime"></div><div class="fg"><label>Что делаем</label><input type="text" id="nrTitle" placeholder="Например: Пробежка"></div><button class="btn btn-p" style="width:100%" onclick="addRutMgr()">Добавить</button></div><div class="mactions"><button class="btn btn-s" onclick="closeM();renderAll();">Готово</button></div>`;},350);}
function addRutMgr(){const t=document.getElementById('nrTitle').value.trim();if(!t)return;D.routine.push({id:uid(),title:t,time:document.getElementById('nrTime').value,doneDates:[]});save(D);addXP(XP_PER.routine,window.innerWidth/2,300);openRutMgr();}
function delRut(id){D.routine=D.routine.filter(x=>x.id!==id);save(D);}

function requestNotif(){if(!('Notification' in window)){showNotif('❌ Не поддерживается');return;}Notification.requestPermission().then(p=>{showNotif(p==='granted'?'🔔 Включено!':'❌ Отклонено');});}
setInterval(()=>{if(!('Notification' in window)||Notification.permission!=='granted')return;const now=new Date();const ct=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const today=getToday();D.reminders.forEach(r=>{if(!r.active||!r.time||r.time!==ct)return;if(!r.lastFired||r.lastFired!==today+'_'+ct){new Notification('⚡ Моя Жизнь',{body:r.text,tag:r.id});r.lastFired=today+'_'+ct;save(D);}});},60000);

// ===== RENDER ALL =====
function renderAll(){renderHome();renderGoals();renderHabits();renderAff();renderRem();renderJourn();renderAnalytics();}
renderAll();renderXPBar();checkAchievements();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
