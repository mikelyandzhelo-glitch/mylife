<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARISE">
<meta name="theme-color" content="#080914">
<title>ARISE</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#080914;--bg2:#0d1020;--card:#12172b;--card2:#171d35;--line:rgba(139,155,255,.13);
  --text:#eef1ff;--muted:#8c95bd;--soft:#59617f;--cyan:#58e6ff;--violet:#9b7cff;--green:#4ade80;--red:#fb7185;--gold:#facc15;
  --shadow:0 14px 40px rgba(0,0,0,.28);--r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{background:
  radial-gradient(circle at 20% -10%,rgba(88,230,255,.16),transparent 32%),
  radial-gradient(circle at 95% 5%,rgba(155,124,255,.16),transparent 28%),
  linear-gradient(180deg,#080914 0%,#090b16 100%);overflow-x:hidden}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{width:min(100%,520px);margin:0 auto;padding:0 16px calc(86px + env(safe-area-inset-bottom,0px))}
.header{position:sticky;top:0;z-index:20;margin:0 -16px;padding:calc(12px + env(safe-area-inset-top,0px)) 16px 12px;background:rgba(8,9,20,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;color:#05101b;font-weight:900;box-shadow:0 0 28px rgba(88,230,255,.22)}
h1{font-size:22px;letter-spacing:2px;margin:0;line-height:1}.date{font-size:12px;color:var(--muted);margin-top:4px}.icon-btn{width:40px;height:40px;border:1px solid var(--line);background:rgba(18,23,43,.82);color:var(--text);border-radius:14px;display:grid;place-items:center}
.rank{margin-top:14px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px}.badge{min-width:38px;text-align:center;padding:7px 10px;border-radius:12px;background:rgba(88,230,255,.12);color:var(--cyan);font-weight:900;letter-spacing:1px;border:1px solid rgba(88,230,255,.18)}
.bar{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:99px;transition:width .35s ease}.xp{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap}
.page{display:none;padding-top:16px;animation:fade .22s ease}.page.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{padding:18px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,rgba(18,23,43,.95),rgba(18,23,43,.68));box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;right:-45px;top:-45px;width:140px;height:140px;border-radius:50%;background:rgba(88,230,255,.08)}
.hero-title{font-size:14px;color:var(--muted);margin-bottom:8px}.quote{font-size:19px;font-weight:800;line-height:1.22;margin:0 0 16px}.day-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.metric{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:12px 10px}.metric b{display:block;font-size:18px}.metric span{display:block;margin-top:3px;font-size:11px;color:var(--muted)}
.section{margin-top:18px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.section h2{font-size:16px;margin:0}.link-btn{border:0;background:transparent;color:var(--cyan);padding:8px 0;font-weight:800}.primary{width:100%;border:0;border-radius:18px;padding:15px 16px;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#06101b;font-weight:900;box-shadow:0 12px 30px rgba(88,230,255,.16)}
.card{border:1px solid var(--line);border-radius:var(--r);background:rgba(18,23,43,.82);box-shadow:0 10px 26px rgba(0,0,0,.14)}
.task{display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:9px}.task.done{opacity:.62}.check{width:30px;height:30px;border-radius:11px;border:2px solid rgba(88,230,255,.68);background:transparent;color:#06101b;font-weight:900;display:grid;place-items:center;flex:0 0 auto}.task.done .check{background:var(--green);border-color:var(--green)}.task-main{flex:1;min-width:0}.task-title{font-size:15px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task.done .task-title{text-decoration:line-through}.task-meta{margin-top:3px;color:var(--muted);font-size:12px}.danger{border:0;background:rgba(251,113,133,.10);color:var(--red);border-radius:12px;padding:8px 10px}.empty{padding:20px;text-align:center;color:var(--muted);line-height:1.4}.empty .big{font-size:34px;margin-bottom:8px}
.note-box{padding:14px}.note-box textarea,.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:16px;background:#0a0d1a;color:var(--text);padding:13px 14px;outline:none}.note-box textarea{min-height:92px;resize:vertical}.row{display:flex;gap:9px}.row>*{flex:1}.secondary{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:16px;padding:13px 14px;font-weight:800}.mini{padding:9px 11px;border-radius:13px;font-size:12px}.notes{display:grid;gap:10px}.entry{padding:14px}.entry-date{font-size:12px;color:var(--muted);margin-bottom:7px}.entry-text{font-size:14px;line-height:1.45;white-space:pre-wrap}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{padding:16px}.stat .num{font-size:24px;font-weight:900}.stat .lbl{font-size:12px;color:var(--muted);margin-top:4px}.settings{display:grid;gap:9px;margin-top:16px}.setting{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 15px;border:1px solid var(--line);border-radius:18px;background:rgba(18,23,43,.82);color:var(--text);text-align:left}.setting span{color:var(--muted);font-size:12px;display:block;margin-top:3px}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:30;width:min(100%,520px);padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));background:rgba(8,9,20,.88);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.nav button{border:0;background:transparent;color:var(--soft);border-radius:16px;padding:9px 6px;font-size:11px;font-weight:800}.nav button b{display:block;font-size:21px;line-height:1;margin-bottom:3px}.nav button.on{background:rgba(88,230,255,.10);color:var(--cyan)}
.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.62);display:none;align-items:flex-end}.modal.on{display:flex}.sheet{width:min(100%,520px);margin:0 auto;background:#0c0f1f;border:1px solid var(--line);border-bottom:0;border-radius:24px 24px 0 0;padding:14px 16px calc(18px + env(safe-area-inset-bottom,0px));box-shadow:var(--shadow)}.handle{width:44px;height:4px;background:#30384f;border-radius:99px;margin:0 auto 14px}.sheet h3{margin:0 0 14px;font-size:18px}.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:800}.toast{position:fixed;left:50%;top:calc(12px + env(safe-area-inset-top,0px));transform:translateX(-50%) translateY(-20px);z-index:90;width:min(calc(100% - 28px),492px);padding:13px 15px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#06101b;font-weight:900;text-align:center;opacity:0;pointer-events:none;transition:.25s}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}.xp-pop{position:fixed;z-index:100;color:var(--gold);font-weight:900;text-shadow:0 0 16px rgba(250,204,21,.35);animation:pop 1s ease forwards;pointer-events:none}@keyframes pop{to{opacity:0;transform:translateY(-42px) scale(1.25)}}
@media (max-width:360px){.app{padding-left:12px;padding-right:12px}.header{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}.quote{font-size:17px}.task-title{font-size:14px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
  <header class="header">
    <div class="top">
      <div class="brand"><div class="logo">⚡</div><div><h1>ARISE</h1><div class="date" id="dateLabel"></div></div></div>
      <button class="icon-btn" id="quickAdd" title="Добавить">＋</button>
    </div>
    <div class="rank"><div class="badge" id="rankBadge">E</div><div class="bar"><div class="fill" id="xpFill"></div></div><div class="xp" id="xpText">0 XP</div></div>
  </header>

  <main>
    <section class="page active" id="page-today">
      <div class="hero">
        <div class="hero-title">Система дня</div>
        <p class="quote" id="quote">Вставай. Маленький шаг тоже считается.</p>
        <div class="day-grid">
          <div class="metric"><b id="doneCount">0/0</b><span>выполнено</span></div>
          <div class="metric"><b id="todayXp">0</b><span>XP сегодня</span></div>
          <div class="metric"><b id="streak">0</b><span>серия дней</span></div>
        </div>
      </div>
      <div class="section">
        <div class="section-head"><h2>Сегодня</h2><button class="link-btn" id="addTaskBtn">+ задача</button></div>
        <div id="taskList"></div>
      </div>
      <div class="section">
        <div class="section-head"><h2>Быстрая мысль</h2></div>
        <div class="note-box card"><textarea id="quickNote" placeholder="Что важно запомнить сегодня?"></textarea><div style="height:10px"></div><button class="primary" id="saveQuickNote">Сохранить в дневник +5 XP</button></div>
      </div>
    </section>

    <section class="page" id="page-journal">
      <div class="section" style="margin-top:0">
        <div class="section-head"><h2>Дневник</h2><button class="link-btn" id="newNoteBtn">+ запись</button></div>
        <div id="notesList" class="notes"></div>
      </div>
    </section>

    <section class="page" id="page-stats">
      <div class="section" style="margin-top:0">
        <div class="section-head"><h2>Я</h2></div>
        <div class="stats-grid">
          <div class="stat card"><div class="num" id="sRank">E</div><div class="lbl">текущий ранг</div></div>
          <div class="stat card"><div class="num" id="sXp">0</div><div class="lbl">XP всего</div></div>
          <div class="stat card"><div class="num" id="sTasks">0</div><div class="lbl">задач</div></div>
          <div class="stat card"><div class="num" id="sNotes">0</div><div class="lbl">записей</div></div>
          <div class="stat card"><div class="num" id="sDone">0</div><div class="lbl">сделано сегодня</div></div>
          <div class="stat card"><div class="num" id="sStreak">0</div><div class="lbl">серия дней</div></div>
        </div>
        <div class="settings">
          <button class="setting" id="exportBtn"><div>💾 Экспорт данных<span>Скачать резервную копию JSON</span></div>›</button>
          <button class="setting" id="importBtn"><div>📂 Импорт данных<span>Восстановить из файла ARISE</span></div>›</button>
          <button class="setting" id="resetBtn"><div style="color:var(--red)">🗑 Сбросить<span>Удалить данные этого приложения</span></div>›</button>
        </div>
      </div>
    </section>
  </main>
</div>

<nav class="nav">
  <button class="on" data-page="today"><b>🏠</b>Сегодня</button>
  <button data-page="journal"><b>📔</b>Дневник</button>
  <button data-page="stats"><b>⚡</b>Я</button>
</nav>

<div class="modal" id="modal"><div class="sheet"><div class="handle"></div><div id="sheetBody"></div></div></div>
<input type="file" id="fileInput" accept="application/json,.json" hidden>

<script>
(function(){
'use strict';
var KEY='arise_lite_v1';
var OLD_D='arise6', OLD_X='arise6_xp';
var RANKS=[{r:'E',min:0},{r:'D',min:300},{r:'C',min:800},{r:'B',min:1500},{r:'A',min:3000},{r:'S',min:5000}];
var QUOTES=['Вставай. Маленький шаг тоже считается.','Не завтра. Не потом. Сегодня.','Дисциплина — это свобода.','Сделай день чуть сильнее вчерашнего.','ARISE. Поднимайся каждый раз.','Сначала действие, потом мотивация.','Твоя система строится одним выполненным делом.'];
var DEFAULT_TASKS=[
  {title:'Тренировка или прогулка',xp:20},
  {title:'Чтение / обучение 20 минут',xp:15},
  {title:'Порядок в делах',xp:10},
  {title:'Дневник или план на завтра',xp:10}
];
var $=function(id){return document.getElementById(id)};
var state=load();

function localDate(d){d=d||new Date();var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day}
function fmtDate(s){var p=s.split('-');return p[2]+'.'+p[1]+'.'+p[0]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]})}
function load(){
  try{var raw=localStorage.getItem(KEY);if(raw){var data=JSON.parse(raw);return normalize(data)}}catch(e){}
  var migrated=migrateOld(); if(migrated) return migrated;
  return normalize({tasks:DEFAULT_TASKS.map(function(t){return {id:uid(),title:t.title,xp:t.xp,doneDates:[],createdAt:localDate()}}),notes:[],xp:{total:0,log:{}},createdAt:localDate()});
}
function normalize(d){
  d=d||{}; d.tasks=Array.isArray(d.tasks)?d.tasks:[]; d.notes=Array.isArray(d.notes)?d.notes:[]; d.xp=d.xp||{}; d.xp.total=Number(d.xp.total)||0; d.xp.log=d.xp.log||{}; d.createdAt=d.createdAt||localDate(); return d;
}
function migrateOld(){
  try{
    var od=JSON.parse(localStorage.getItem(OLD_D)||'null'), ox=JSON.parse(localStorage.getItem(OLD_X)||'null');
    if(!od&&!ox)return null;
    var tasks=[];
    (od&&od.dailyQuests||[]).slice(0,12).forEach(function(q){tasks.push({id:uid(),title:q.title||'Квест',xp:Number(q.xp)||15,doneDates:q.doneDates||[],createdAt:localDate()})});
    if(!tasks.length)tasks=DEFAULT_TASKS.map(function(t){return {id:uid(),title:t.title,xp:t.xp,doneDates:[],createdAt:localDate()}});
    var notes=(od&&od.journal||[]).map(function(j){return {id:uid(),date:j.date||localDate(),time:j.time||'',text:j.text||'',xpGiven:0}}).filter(function(j){return j.text});
    var data=normalize({tasks:tasks,notes:notes,xp:{total:(ox&&Number(ox.total))||0,log:{}},createdAt:localDate(),migrated:true});
    save(data); return data;
  }catch(e){return null}
}
function save(data){localStorage.setItem(KEY,JSON.stringify(data||state))}
function rank(){var r=RANKS[0];RANKS.forEach(function(x){if(state.xp.total>=x.min)r=x});return r}
function nextRank(){var cur=rank();for(var i=0;i<RANKS.length;i++){if(RANKS[i].min>cur.min)return RANKS[i]}return null}
function rankPct(){var cur=rank(),next=nextRank();if(!next)return 100;return Math.max(0,Math.min(100,Math.round((state.xp.total-cur.min)/(next.min-cur.min)*100)))}
function doneToday(){var td=localDate();return state.tasks.filter(function(t){return (t.doneDates||[]).indexOf(td)>=0})}
function todayXp(){return Number(state.xp.log[localDate()]||0)}
function addXp(amount,el){amount=Number(amount)||0;if(!amount)return;var td=localDate();state.xp.total=Math.max(0,state.xp.total+amount);state.xp.log[td]=Math.max(0,(Number(state.xp.log[td])||0)+amount);save(); if(amount>0)popXp(amount,el);}
function popXp(a,el){var p=document.createElement('div');p.className='xp-pop';p.textContent='+'+a+' XP';var x=innerWidth/2,y=190;if(el&&el.getBoundingClientRect){var r=el.getBoundingClientRect();x=r.left+r.width/2;y=r.top+4}p.style.left=x+'px';p.style.top=y+'px';document.body.appendChild(p);setTimeout(function(){p.remove()},1000)}
function activityDates(){var set={};state.tasks.forEach(function(t){(t.doneDates||[]).forEach(function(d){set[d]=1})});state.notes.forEach(function(n){set[n.date]=1});return set}
function streak(){var set=activityDates(),d=new Date(),n=0;for(var i=0;i<730;i++){var ds=localDate(d);if(set[ds]){n++;d.setDate(d.getDate()-1)}else{if(i===0){d.setDate(d.getDate()-1);continue}break}}return n}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('on')},2200)}

function render(){
  var td=localDate(); $('dateLabel').textContent=fmtDate(td); $('quote').textContent=QUOTES[new Date().getDate()%QUOTES.length];
  var rk=rank(); $('rankBadge').textContent=rk.r; $('xpText').textContent=state.xp.total+' XP'; $('xpFill').style.width=rankPct()+'%';
  var d=doneToday(); $('doneCount').textContent=d.length+'/'+state.tasks.length; $('todayXp').textContent=todayXp(); $('streak').textContent=streak();
  renderTasks(); renderNotes(); renderStats();
}
function renderTasks(){
  var box=$('taskList'),td=localDate();
  if(!state.tasks.length){box.innerHTML='<div class="empty card"><div class="big">⚔️</div>Нет задач. Добавь первый ежедневный квест.</div>';return}
  box.innerHTML=state.tasks.map(function(t){var done=(t.doneDates||[]).indexOf(td)>=0;return '<div class="task card '+(done?'done':'')+'" data-id="'+t.id+'"><button class="check" data-act="toggle">'+(done?'✓':'')+'</button><div class="task-main"><div class="task-title">'+esc(t.title)+'</div><div class="task-meta">+'+(Number(t.xp)||10)+' XP · серия '+taskStreak(t)+' дн.</div></div><button class="danger" data-act="delete">✕</button></div>'}).join('');
  box.querySelectorAll('.task').forEach(function(row){row.addEventListener('click',function(e){var act=e.target.getAttribute('data-act');if(!act)return;var id=row.getAttribute('data-id');if(act==='toggle')toggleTask(id,e.target);if(act==='delete')deleteTask(id)})});
}
function taskStreak(t){var arr=(t.doneDates||[]).slice().sort(),set={};arr.forEach(function(d){set[d]=1});var d=new Date(),n=0;for(var i=0;i<365;i++){var ds=localDate(d);if(set[ds]){n++;d.setDate(d.getDate()-1)}else{if(i===0){d.setDate(d.getDate()-1);continue}break}}return n}
function toggleTask(id,el){var t=state.tasks.find(function(x){return x.id===id});if(!t)return;var td=localDate();t.doneDates=t.doneDates||[];var i=t.doneDates.indexOf(td);var xp=Number(t.xp)||10;if(i>=0){t.doneDates.splice(i,1);addXp(-xp);toast('Отменено')}else{t.doneDates.push(td);addXp(xp,el);toast('Квест выполнен')}save();render()}
function deleteTask(id){if(!confirm('Удалить задачу?'))return;state.tasks=state.tasks.filter(function(t){return t.id!==id});save();render();toast('Удалено')}
function renderNotes(){var list=$('notesList');var notes=state.notes.slice().sort(function(a,b){return (b.date+(b.time||'')).localeCompare(a.date+(a.time||''))});if(!notes.length){list.innerHTML='<div class="empty card"><div class="big">📔</div>Пока нет записей. Напиши пару строк о сегодняшнем дне.</div>';return}list.innerHTML=notes.map(function(n){return '<div class="entry card"><div class="entry-date">'+fmtDate(n.date)+(n.time?' · '+esc(n.time):'')+'</div><div class="entry-text">'+esc(n.text)+'</div></div>'}).join('')}
function renderStats(){var d=doneToday();$('sRank').textContent=rank().r;$('sXp').textContent=state.xp.total;$('sTasks').textContent=state.tasks.length;$('sNotes').textContent=state.notes.length;$('sDone').textContent=d.length;$('sStreak').textContent=streak()}
function openModal(html){$('sheetBody').innerHTML=html;$('modal').classList.add('on')}
function closeModal(){$('modal').classList.remove('on')}
function openTaskModal(){openModal('<h3>Новая задача</h3><div class="field"><label>Название</label><input id="taskTitle" placeholder="Например: Английский 20 минут"></div><div class="field"><label>Награда</label><select id="taskXp"><option value="10">Обычная · 10 XP</option><option value="15" selected>Средняя · 15 XP</option><option value="25">Важная · 25 XP</option></select></div><div class="row"><button class="secondary" id="cancel">Отмена</button><button class="primary" id="create">Создать</button></div>');$('cancel').onclick=closeModal;$('create').onclick=function(){var title=$('taskTitle').value.trim();if(!title)return;state.tasks.push({id:uid(),title:title,xp:Number($('taskXp').value)||15,doneDates:[],createdAt:localDate()});save();closeModal();render();toast('Задача добавлена')};setTimeout(function(){$('taskTitle').focus()},80)}
function openNoteModal(prefill){openModal('<h3>Запись в дневник</h3><div class="field"><label>Текст</label><textarea id="noteText" style="min-height:130px" placeholder="Что произошло? Что понял?">'+esc(prefill||'')+'</textarea></div><div class="row"><button class="secondary" id="cancel">Отмена</button><button class="primary" id="saveNote">Сохранить +5 XP</button></div>');$('cancel').onclick=closeModal;$('saveNote').onclick=function(){saveNote($('noteText').value)};setTimeout(function(){$('noteText').focus()},80)}
function saveNote(text){text=(text||'').trim();if(!text)return;var now=new Date();state.notes.push({id:uid(),date:localDate(now),time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),text:text,xpGiven:5});addXp(5);save();closeModal();$('quickNote').value='';render();toast('Записано в дневник')}
function exportData(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='arise_'+localDate()+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(a.href)},1000);toast('Экспорт готов')}
function importData(file){var r=new FileReader();r.onload=function(){try{var data=normalize(JSON.parse(r.result));state=data;save();render();toast('Данные восстановлены')}catch(e){toast('Не удалось импортировать')}};r.readAsText(file)}

$('addTaskBtn').onclick=openTaskModal;$('quickAdd').onclick=openTaskModal;$('newNoteBtn').onclick=function(){openNoteModal('')};$('saveQuickNote').onclick=function(){openNoteModal($('quickNote').value)};
$('exportBtn').onclick=exportData;$('importBtn').onclick=function(){$('fileInput').click()};$('fileInput').onchange=function(e){if(e.target.files[0])importData(e.target.files[0]);e.target.value=''};
$('resetBtn').onclick=function(){if(confirm('Удалить все данные ARISE Lite? Старые данные прошлой версии не трогаем.')){localStorage.removeItem(KEY);state=normalize({tasks:DEFAULT_TASKS.map(function(t){return {id:uid(),title:t.title,xp:t.xp,doneDates:[],createdAt:localDate()}}),notes:[],xp:{total:0,log:{}},createdAt:localDate()});save();render();toast('Сброшено')}};
$('modal').addEventListener('click',function(e){if(e.target===$('modal'))closeModal()});
document.querySelectorAll('.nav button').forEach(function(b){b.onclick=function(){document.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});$('page-'+b.getAttribute('data-page')).classList.add('active');render()}});
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
})();
