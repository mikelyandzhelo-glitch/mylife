<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Моя Жизнь">
    <meta name="theme-color" content="#1a1a2e">
    <title>Моя Жизнь</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2744;
            --text-primary: #eee;
            --text-secondary: #8892b0;
            --text-muted: #5a6380;
            --accent: #e94560;
            --accent-light: #ff6b81;
            --success: #00d2d3;
            --warning: #feca57;
            --info: #54a0ff;
            --purple: #a855f7;
            --orange: #f97316;
            --border: rgba(255,255,255,0.06);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 480px; margin: 0 auto;
            min-height: 100vh; min-height: 100dvh;
            position: relative;
            padding-bottom: calc(68px + var(--safe-bottom));
        }

        /* ===== HEADER ===== */
        .app-header {
            padding: 16px 20px 8px;
            padding-top: calc(16px + env(safe-area-inset-top, 0px));
            position: sticky; top: 0; z-index: 100;
            background: rgba(15,15,35,0.92);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
        }

        .header-left h1 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-left .date { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            width: 38px; height: 38px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-secondary); font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .header-btn:active { transform: scale(0.92); background: var(--bg-card-hover); }

        /* ===== PAGES ===== */
        .page { display:none; padding:8px 20px 20px; animation: fadeIn 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-size: 16px; font-weight: 600; margin: 18px 0 10px;
            display: flex; align-items: center; gap: 7px;
        }
        .section-title .icon { font-size: 18px; }
        .section-title .see-all {
            margin-left: auto; font-size: 12px; color: var(--accent);
            font-weight: 500; cursor: pointer;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--bg-card); border-radius: 14px; padding: 14px;
            margin-bottom: 10px; border: 1px solid var(--border);
            transition: all 0.15s; cursor: pointer;
        }
        .card:active { transform: scale(0.98); background: var(--bg-card-hover); }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .card-subtitle { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

        /* ===== ADD BUTTON ===== */
        .add-btn {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 2px dashed rgba(233,69,96,0.25); background: transparent;
            color: var(--accent); font-size: 13px; font-weight: 500;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all 0.2s;
        }
        .add-btn:active { background: rgba(233,69,96,0.08); transform: scale(0.98); }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: rgba(15,15,35,0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around;
            padding: 6px 0; padding-bottom: calc(6px + var(--safe-bottom));
            z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 5px 8px; border: none; background: none;
            color: var(--text-muted); font-size: 9px; font-family: inherit;
            cursor: pointer; border-radius: 8px; transition: all 0.2s;
            min-width: 54px;
        }
        .nav-item .nav-icon { font-size: 20px; line-height: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active .nav-icon { transform: scale(1.1); }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 2000;
            justify-content: center; align-items: flex-end;
            animation: fadeOverlay 0.2s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeOverlay { from{opacity:0} to{opacity:1} }

        .modal {
            background: var(--bg-secondary); border-radius: 20px 20px 0 0;
            padding: 16px; padding-bottom: calc(16px + var(--safe-bottom));
            width: 100%; max-width: 480px; max-height: 88vh;
            overflow-y: auto; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

        .modal-handle { width: 36px; height: 4px; background: var(--text-muted); border-radius: 2px; margin: 0 auto 14px; }
        .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 14px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 11px 12px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-primary); font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
        .form-group textarea { min-height: 70px; resize: vertical; }

        .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
        .btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
            transition: all 0.15s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-card); color: var(--text-secondary); }
        .btn-danger { background: rgba(233,69,96,0.12); color: var(--accent); }
        .btn-success { background: rgba(0,210,211,0.15); color: var(--success); }

        /* ===== STATS GRID ===== */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .stat-card {
            background: var(--bg-card); border-radius: 12px; padding: 12px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* ===== CATEGORY TAGS ===== */
        .category-tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
        .cat-health { background: rgba(0,210,211,0.12); color: var(--success); }
        .cat-finance { background: rgba(254,202,87,0.12); color: var(--warning); }
        .cat-relationship { background: rgba(233,69,96,0.12); color: var(--accent); }
        .cat-career { background: rgba(84,160,255,0.12); color: var(--info); }
        .cat-growth { background: rgba(168,85,247,0.12); color: var(--purple); }
        .cat-other { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

        /* ===== QUOTE WIDGET ===== */
        .quote-widget {
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            border-radius: 16px; padding: 18px; margin-bottom: 12px;
            border: 1px solid rgba(168,85,247,0.15);
            position: relative; overflow: hidden;
        }
        .quote-widget::before {
            content: '💡'; position: absolute; top: -10px; right: -5px;
            font-size: 60px; opacity: 0.08;
        }
        .quote-text {
            font-size: 14px; font-weight: 500; line-height: 1.5;
            font-style: italic; position: relative;
        }
        .quote-author {
            font-size: 11px; color: var(--purple); margin-top: 8px;
            font-weight: 600; font-style: normal;
        }
        .quote-refresh {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255,255,255,0.08); border: none; border-radius: 8px;
            width: 28px; height: 28px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== HABIT ITEMS ===== */
        .habit-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; background: var(--bg-card); border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 6px;
        }
        .habit-check {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0; font-size: 12px;
        }
        .habit-check.done { background: var(--success); border-color: var(--success); color: var(--bg-primary); }
        .habit-name { flex: 1; font-size: 13px; font-weight: 500; }
        .habit-streak { font-size: 10px; color: var(--warning); font-weight: 600; }

        /* ===== GOAL PROGRESS ===== */
        .goal-progress { width: 100%; height: 5px; background: var(--bg-primary); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .goal-progress-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); transition: width 0.5s ease; }
        .goal-meta { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--text-muted); }

        /* ===== AFFIRMATION ===== */
        .affirmation-card {
            background: linear-gradient(135deg, #1a1a3e, #2a1a3e);
            border-radius: 14px; padding: 16px; margin-bottom: 8px;
            border: 1px solid rgba(168,85,247,0.15); position: relative; overflow: hidden;
        }
        .affirmation-card::before {
            content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(168,85,247,0.08), transparent); pointer-events: none;
        }
        .affirmation-text { font-size: 14px; font-weight: 500; line-height: 1.5; position: relative; padding-left: 14px; }
        .affirmation-text::before { content: '\201C'; font-size: 30px; color: var(--purple); position: absolute; top: -8px; left: -2px; opacity: 0.5; }
        .affirmation-actions { display: flex; gap: 6px; margin-top: 10px; position: relative; }
        .affirmation-actions button {
            padding: 5px 10px; border-radius: 6px; border: none;
            font-size: 11px; font-family: inherit; cursor: pointer;
            background: rgba(255,255,255,0.06); color: var(--text-secondary); transition: all 0.2s;
        }

        /* ===== ROUTINE ===== */
        .routine-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: var(--bg-card); border-radius: 12px;
            margin-bottom: 6px; border: 1px solid var(--border);
        }
        .routine-time { font-size: 12px; font-weight: 600; color: var(--accent); min-width: 46px; }
        .routine-desc { flex: 1; font-size: 13px; }
        .routine-toggle {
            width: 42px; height: 24px; border-radius: 12px;
            background: var(--text-muted); position: relative;
            cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .routine-toggle.on { background: var(--success); }
        .routine-toggle::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            border-radius: 50%; background: white; top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .routine-toggle.on::after { transform: translateX(18px); }

        /* ===== JOURNAL ===== */
        .journal-entry {
            padding: 12px; background: var(--bg-card); border-radius: 12px;
            margin-bottom: 8px; border: 1px solid var(--border);
        }
        .journal-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .journal-text { font-size: 13px; line-height: 1.4; color: var(--text-secondary); }

        /* ===== REMINDERS ===== */
        .reminder-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: var(--bg-card); border-radius: 12px;
            margin-bottom: 6px; border: 1px solid var(--border);
        }
        .reminder-bell { font-size: 18px; }
        .reminder-info { flex: 1; }
        .reminder-title { font-size: 13px; font-weight: 500; }
        .reminder-time-label { font-size: 11px; color: var(--text-muted); }
        .reminder-toggle {
            width: 42px; height: 24px; border-radius: 12px;
            background: var(--text-muted); position: relative;
            cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .reminder-toggle.on { background: var(--success); }
        .reminder-toggle::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            border-radius: 50%; background: white; top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .reminder-toggle.on::after { transform: translateX(18px); }

        /* ===== ANALYTICS ===== */
        .analytics-period {
            display: flex; gap: 6px; margin-bottom: 14px;
        }
        .period-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-secondary);
            font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer;
            transition: all 0.2s;
        }
        .period-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .chart-container { margin-bottom: 16px; }
        .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; }
        .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bar {
            width: 100%; border-radius: 4px 4px 0 0;
            background: linear-gradient(to top, var(--accent), var(--accent-light));
            min-height: 4px; transition: height 0.5s ease;
        }
        .bar-label { font-size: 9px; color: var(--text-muted); }
        .bar-value { font-size: 9px; color: var(--text-secondary); font-weight: 600; }

        .analytics-card {
            background: var(--bg-card); border-radius: 14px; padding: 14px;
            border: 1px solid var(--border); margin-bottom: 10px;
        }
        .analytics-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--border);
        }
        .analytics-row:last-child { border-bottom: none; }
        .analytics-row-label { font-size: 13px; color: var(--text-secondary); }
        .analytics-row-value { font-size: 14px; font-weight: 600; }

        /* ===== STEPS ===== */
        .steps-list { margin-top: 6px; }
        .step-item {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
        }
        .step-item:last-child { border-bottom: none; }
        .step-checkbox {
            width: 20px; height: 20px; border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0; font-size: 10px;
        }
        .step-checkbox.done { background: var(--success); border-color: var(--success); color: var(--bg-primary); }
        .step-text { flex: 1; }
        .step-text.done-text { text-decoration: line-through; opacity: 0.5; }
        .step-delete { color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px; }
        .quick-add-step { display: flex; gap: 6px; margin-top: 6px; }
        .quick-add-step input {
            flex: 1; padding: 8px 10px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-primary); font-size: 12px; font-family: inherit; outline: none;
        }
        .quick-add-step input:focus { border-color: var(--accent); }
        .quick-add-step button {
            padding: 8px 12px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-size: 12px; font-family: inherit; cursor: pointer;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 30px 16px; color: var(--text-muted); }
        .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
        .empty-state p { font-size: 13px; line-height: 1.5; }

        /* ===== SETTINGS ===== */
        .settings-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; background: var(--bg-card); border-radius: 12px;
            margin-bottom: 6px; border: 1px solid var(--border); cursor: pointer;
            transition: all 0.15s;
        }
        .settings-item:active { transform: scale(0.98); background: var(--bg-card-hover); }
        .settings-icon { font-size: 22px; }
        .settings-label { flex: 1; font-size: 14px; font-weight: 500; }
        .settings-hint { font-size: 11px; color: var(--text-muted); }

        /* ===== DELETE BTN ===== */
        .delete-btn {
            padding: 4px 10px; border-radius: 6px; border: none;
            background: rgba(233,69,96,0.12); color: var(--accent);
            font-size: 11px; font-family: inherit; cursor: pointer;
        }

        /* ===== NOTIFICATION BANNER ===== */
        .notif-banner {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            padding: 16px; padding-top: calc(12px + env(safe-area-inset-top, 0px));
            background: linear-gradient(135deg, var(--accent), #c0392b);
            color: white; z-index: 3000;
            animation: slideDown 0.3s ease; font-size: 14px; font-weight: 500;
            display: none; text-align: center;
        }
        .notif-banner.show { display: block; }
        @keyframes slideDown { from{transform:translateX(-50%) translateY(-100%)} to{transform:translateX(-50%) translateY(0)} }

        ::-webkit-scrollbar { width: 0; }

        /* ===== OVERVIEW QUOTE ===== */
        .overview-quote {
            font-style: italic; color: var(--text-secondary); font-size: 12px;
            padding: 10px 12px; background: var(--bg-card); border-radius: 10px;
            border-left: 3px solid var(--purple); margin-bottom: 10px; line-height: 1.4;
        }

        /* Circular progress */
        .circular-progress {
            width: 56px; height: 56px; position: relative;
        }
        .circular-progress svg { transform: rotate(-90deg); }
        .circular-progress .value {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="notif-banner" id="notifBanner"></div>

<div class="app">
    <!-- HEADER -->
    <div class="app-header">
        <div class="header-left">
            <h1>⚡ Моя Жизнь</h1>
            <div class="date" id="headerDate"></div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="openSettings()" title="Настройки">⚙️</button>
        </div>
    </div>

    <!-- ===== PAGE: HOME ===== -->
    <div class="page active" id="page-home">
        <div id="homeContent"></div>
    </div>

    <!-- ===== PAGE: GOALS ===== -->
    <div class="page" id="page-goals">
        <div class="section-title"><span class="icon">🎯</span> Мои цели</div>
        <div id="goalsList"></div>
        <button class="add-btn" onclick="openGoalModal()">+ Добавить цель</button>
    </div>

    <!-- ===== PAGE: HABITS ===== -->
    <div class="page" id="page-habits">
        <div class="section-title"><span class="icon">✅</span> Привычки</div>
        <div id="habitsList" class="habit-list"></div>
        <div style="margin-top:10px;">
            <button class="add-btn" onclick="openHabitModal()">+ Добавить привычку</button>
        </div>
    </div>

    <!-- ===== PAGE: MIND ===== -->
    <div class="page" id="page-mind">
        <div class="section-title"><span class="icon">🧠</span> Самопрограммирование</div>
        <div id="affirmationsList"></div>
        <button class="add-btn" onclick="openAffirmationModal()">+ Добавить установку</button>

        <div class="section-title"><span class="icon">⏰</span> Напоминания</div>
        <div id="remindersList"></div>
        <button class="add-btn" onclick="openReminderModal()" style="margin-top:10px;">+ Добавить напоминание</button>

        <div class="section-title"><span class="icon">📔</span> Дневник мыслей</div>
        <div id="journalList"></div>
        <button class="add-btn" onclick="openJournalModal()" style="margin-top:10px;">+ Записать мысль</button>
    </div>

    <!-- ===== PAGE: ANALYTICS ===== -->
    <div class="page" id="page-analytics">
        <div class="section-title" style="margin-top:8px;"><span class="icon">📊</span> Аналитика</div>
        <div class="analytics-period">
            <button class="period-btn active" onclick="setPeriod('week',this)">Неделя</button>
            <button class="period-btn" onclick="setPeriod('month',this)">Месяц</button>
        </div>
        <div id="analyticsContent"></div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('home')" data-page="home">

function getDailyQuote() {
    const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
    return QUOTES[dayOfYear % QUOTES.length];
}

function getRandomQuote() {
    return QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

const DB_KEY = 'mylife_app_data';
function loadData() {
    try { const r = localStorage.getItem(DB_KEY); if(r) return JSON.parse(r); } catch(e){}
    return { goals:[], habits:[], affirmations:[], journal:[], routine:[], reminders:[] };
}
function saveData(d) { localStorage.setItem(DB_KEY, JSON.stringify(d)); }

// ===== HELPERS =====
function getToday() { return new Date().toISOString().split('T')[0]; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function formatDateRu(ds) {
    const d = new Date(ds);
    const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
}
function formatDateFull(ds) {
    const d = new Date(ds);
    const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function getDayLabel(ds) {
    const today = getToday();
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    if(ds === today) return 'Сегодня';
    if(ds === yesterday) return 'Вчера';
    return formatDateRu(ds);
}
function getCatLabel(c) {
    return {health:'💪 Здоровье',finance:'💰 Финансы',relationship:'❤️ Отношения',career:'💼 Карьера',growth:'📚 Развитие',other:'📌 Другое'}[c] || '📌 Другое';
}

// ===== RENDER: HABITS =====
function renderHabits() {
    const el = document.getElementById('habitsList');
    const today = getToday();
    if(!appData.habits.length) { el.innerHTML = `<div class="empty-state"><div class="emoji">✅</div><p>Нет привычек.<br>Добавь привычки для отслеживания!</p></div>`; return; }
    let h = '';
    appData.habits.forEach(hb=>{
        const done = hb.doneDates&&hb.doneDates.includes(today);
        let streak = 0;
        if(hb.doneDates&&hb.doneDates.length>0) {
            const sorted = [...hb.doneDates].sort().reverse();
            const d = new Date();
            for(let i=0;i<365;i++) {
                const ds = d.toISOString().split('T')[0];
                if(sorted.includes(ds)) { streak++; d.setDate(d.getDate()-1); }
                else { if(i===0){d.setDate(d.getDate()-1);continue;} break; }
            }
        }
        h += `<div class="habit-item">
            <div class="habit-check ${done?'done':''}" onclick="toggleHabit('${hb.id}')">${done?'✓':''}</div>
            <div class="habit-name">${hb.title}</div>
            ${streak>0?`<div class="habit-streak">🔥${streak}</div>`:''}
            <button class="delete-btn" onclick="deleteHabit('${hb.id}')">✕</button>
        </div>`;
    });
    el.innerHTML = h;
}

// ===== RENDER: ANALYTICS =====
let analyticsPeriod = 'week';

function setPeriod(p, btn) {
    analyticsPeriod = p;
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderAnalytics();
}

function renderAnalytics() {
    const el = document.getElementById('analyticsContent');
    const days = analyticsPeriod === 'week' ? 7 : 30;
    const today = new Date();
    const dates = [];
    for(let i=days-1; i>=0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate()-i);
        dates.push(d.toISOString().split('T')[0]);
    }

    // Habits completion per day
    const habitData = dates.map(d => {
        const done = appData.habits.filter(h=>h.doneDates&&h.doneDates.includes(d)).length;
        return { date: d, done, total: appData.habits.length };
    });
    const habitAvg = appData.habits.length > 0
        ? Math.round(habitData.reduce((a,d)=>a+d.done,0) / (habitData.length * appData.habits.length) * 100)
        : 0;

    // Routine completion per day
    const routineData = dates.map(d => {
        const done = appData.routine.filter(r=>r.doneDates&&r.doneDates.includes(d)).length;
        return { date: d, done, total: appData.routine.length };
    });
    const routineAvg = appData.routine.length > 0
        ? Math.round(routineData.reduce((a,d)=>a+d.done,0) / (routineData.length * appData.routine.length) * 100)
        : 0;

    // Journal entries count per day
    const journalData = dates.map(d => appData.journal.filter(j=>j.date===d).length);
    const totalJournal = journalData.reduce((a,b)=>a+b,0);

    // Goals progress
    const totalSteps = appData.goals.reduce((a,g)=>a+(g.steps||[]).length, 0);
    const doneSteps = appData.goals.reduce((a,g)=>a+(g.steps||[]).filter(s=>s.done).length, 0);
    const goalPct = totalSteps > 0 ? Math.round(doneSteps/totalSteps*100) : 0;

    // Best habit streaks
    const habitStreaks = appData.habits.map(h => {
        let streak = 0;
        if(h.doneDates&&h.doneDates.length>0) {
            const sorted = [...h.doneDates].sort().reverse();
            const d = new Date();
            for(let i=0;i<365;i++) {
                const ds = d.toISOString().split('T')[0];
                if(sorted.includes(ds)){streak++;d.setDate(d.getDate()-1);}
                else{if(i===0){d.setDate(d.getDate()-1);continue;}break;}
            }
        }
        return { title: h.title, streak };
    }).sort((a,b)=>b.streak-a.streak);

    // Chart bars
    const chartDays = analyticsPeriod === 'week' ? 7 : 7; // show last 7 bars even for month
    const chartData = analyticsPeriod === 'week' ? habitData : habitData.filter((_,i)=>i%Math.ceil(days/7)===0||i===days-1).slice(-7);
    const maxHabit = Math.max(...chartData.map(d=>d.total), 1);

    let habitChartHtml = '';
    chartData.forEach(d => {
        const pct = d.total > 0 ? (d.done/d.total*100) : 0;
        const h = Math.max(pct, 4);
        const label = analyticsPeriod === 'week'
            ? ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][new Date(d.date+'T12:00:00').getDay()]
            : formatDateRu(d.date);
        habitChartHtml += `<div class="bar-col">
            <div class="bar-value">${d.done}/${d.total}</div>
            <div class="bar" style="height:${h}%"></div>
            <div class="bar-label">${label}</div>
        </div>`;
    });

    // Routine chart
    const routineChartData = analyticsPeriod === 'week' ? routineData : routineData.filter((_,i)=>i%Math.ceil(days/7)===0||i===days-1).slice(-7);
    let routineChartHtml = '';
    routineChartData.forEach(d => {
        const pct = d.total > 0 ? (d.done/d.total*100) : 0;
        const h = Math.max(pct, 4);
        const label = analyticsPeriod === 'week'
            ? ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][new Date(d.date+'T12:00:00').getDay()]
            : formatDateRu(d.date);
        routineChartHtml += `<div class="bar-col">
            <div class="bar-value">${d.done}/${d.total}</div>
            <div class="bar" style="height:${h}%;background:linear-gradient(to top,var(--success),#00e6e6)"></div>
            <div class="bar-label">${label}</div>
        </div>`;
    });

    let html = '';

    // Summary card
    html += `<div class="analytics-card">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px">📋 Общий прогресс</div>
        <div class="analytics-row">
            <div class="analytics-row-label">🎯 Цели выполнено</div>
            <div class="analytics-row-value" style="color:var(--accent)">${doneSteps}/${totalSteps} (${goalPct}%)</div>
        </div>
        <div class="analytics-row">
            <div class="analytics-row-label">✅ Привычки (среднее)</div>
            <div class="analytics-row-value" style="color:var(--success)">${habitAvg}%</div>
        </div>
        <div class="analytics-row">
            <div class="analytics-row-label">📅 Режим (среднее)</div>
            <div class="analytics-row-value" style="color:var(--info)">${routineAvg}%</div>
        </div>
        <div class="analytics-row">
            <div class="analytics-row-label">📔 Записей в дневнике</div>
            <div class="analytics-row-value" style="color:var(--purple)">${totalJournal}</div>
        </div>
    </div>`;

    // Habits chart
    if(appData.habits.length > 0) {
        html += `<div class="chart-container">
            <div class="chart-title">✅ Привычки — выполнение</div>
            <div class="bar-chart">${habitChartHtml}</div>
        </div>`;
    }

    // Routine chart
    if(appData.routine.length > 0) {
        html += `<div class="chart-container">
            <div class="chart-title">📅 Режим дня — выполнение</div>
            <div class="bar-chart">${routineChartHtml}</div>
        </div>`;
    }

    // Habit streaks
    if(habitStreaks.length > 0 && habitStreaks.some(h=>h.streak>0)) {
        html += `<div class="analytics-card">
            <div style="font-size:14px;font-weight:600;margin-bottom:8px">🔥 Серии привычек</div>`;
        habitStreaks.filter(h=>h.streak>0).forEach(h=>{
            html += `<div class="analytics-row">
                <div class="analytics-row-label">${h.title}</div>
                <div class="analytics-row-value" style="color:var(--warning)">🔥 ${h.streak} дн.</div>
            </div>`;
        });
        html += `</div>`;
    }

    // Mood analysis
    const moods = appData.journal.filter(j=>j.mood).map(j=>j.mood);
    if(moods.length > 0) {
        const moodCounts = {};
        moods.forEach(m => moodCounts[m] = (moodCounts[m]||0)+1);
        const topMood = Object.entries(moodCounts).sort((a,b)=>b[1]-a[1])[0];
        html += `<div class="analytics-card">
            <div style="font-size:14px;font-weight:600;margin-bottom:8px">🎭 Анализ настроения</div>
            <div class="analytics-row">
                <div class="analytics-row-label">Частое настроение</div>
                <div class="analytics-row-value">${topMood[0]} (×${topMood[1]})</div>
            </div>
            <div class="analytics-row">
                <div class="analytics-row-label">Всего записей с настроением</div>
                <div class="analytics-row-value">${moods.length}</div>
            </div>
        </div>`;
    }

    if(appData.goals.length===0 && appData.habits.length===0 && appData.routine.length===0) {
        html += `<div class="empty-state"><div class="emoji">📊</div><p>Недостаточно данных.<br>Начни пользоваться приложением —<br>здесь появится аналитика!</p></div>`;
    }

    el.innerHTML = html;
}

// ===== ACTIONS: GOALS =====
function openGoalModal() {
    openModal(`<h2>Новая цель</h2>
        <div class="form-group"><label>Название</label><input type="text" id="goalTitle" placeholder="Что ты хочешь достичь?"></div>
        <div class="form-group"><label>Описание</label><textarea id="goalDesc" placeholder="Почему это важно?"></textarea></div>
        <div class="form-group"><label>Категория</label>
            <select id="goalCat">
                <option value="health">💪 Здоровье</option><option value="finance">💰 Финансы</option>
                <option value="relationship">❤️ Отношения</option><option value="career">💼 Карьера</option>
                <option value="growth">📚 Развитие</option><option value="other">📌 Другое</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="forceCloseModal()">Отмена</button>
            <button class="btn btn-primary" onclick="addGoal()">Создать</button>
        </div>`);
}
function addGoal() {
    const t = document.getElementById('goalTitle').value.trim(); if(!t)return;
    appData.goals.push({id:uid(),title:t,description:document.getElementById('goalDesc').value.trim(),category:document.getElementById('goalCat').value,steps:[],createdAt:getToday()});
    saveData(appData); forceCloseModal(); renderAll(); showNotif('🎯 Цель добавлена!');
}
function deleteGoal(id) { if(!confirm('Удалить цель?'))return; appData.goals=appData.goals.filter(g=>g.id!==id); saveData(appData); renderAll(); }

function openGoalDetail(id) {
    const g = appData.goals.find(x=>x.id===id); if(!g)return;
    let sh = '';
    (g.steps||[]).forEach((s,i)=>{
        sh += `<div class="step-item">
            <div class="step-checkbox ${s.done?'done':''}" onclick="toggleStep('${id}',${i})">${s.done?'✓':''}</div>
            <div class="step-text ${s.done?'done-text':''}">${s.text}</div>
            <div class="step-delete" onclick="deleteStep('${id}',${i})">✕</div>
        </div>`;
    });
    openModal(`<h2>${g.title}</h2>
        ${g.description?`<p style="color:var(--text-secondary);font-size:13px;margin-bottom:10px">${g.description}</p>`:''}
        <div class="section-title" style="margin-top:0"><span class="icon">📋</span> Шаги</div>
        <div class="steps-list">${sh}</div>
        <div class="quick-add-step"><input type="text" id="newStepText" placeholder="Новый шаг..."><button onclick="addStep('${id}')">+</button></div>
        <div class="modal-actions"><button class="btn btn-secondary" onclick="forceCloseModal()">Закрыть</button></div>`);
}
function addStep(gid) {
    const t=document.getElementById('newStepText').value.trim(); if(!t)return;
    const g=appData.goals.find(x=>x.id===gid); if(!g.steps)g.steps=[];
    g.steps.push({text:t,done:false}); saveData(appData); openGoalDetail(gid); renderAll();
}
function toggleStep(gid,i) {
    const g=appData.goals.find(x=>x.id===gid); g.steps[i].done=!g.steps[i].done;
    saveData(appData); openGoalDetail(gid); renderAll();
}
function deleteStep(gid,i) {
    const g=appData.goals.find(x=>x.id===gid); g.steps.splice(i,1);
    saveData(appData); openGoalDetail(gid); renderAll();
}

// ===== SETTINGS & BACKUP =====
function openSettings() {
    openModal(`<h2>⚙️ Настройки</h2>
        <div class="settings-item" onclick="exportData()">
            <div class="settings-icon">💾</div>
            <div><div class="settings-label">Экспорт данных</div><div class="settings-hint">Скачать бэкап в JSON файл</div></div>
        </div>
        <div class="settings-item" onclick="document.getElementById('importFile').click();forceCloseModal();">
            <div class="settings-icon">📂</div>
            <div><div class="settings-label">Импорт данных</div><div class="settings-hint">Восстановить из бэкапа</div></div>
        </div>
        <div class="settings-item" onclick="requestNotificationPermission()">
            <div class="settings-icon">🔔</div>
            <div><div class="settings-label">Разрешить уведомления</div><div class="settings-hint">Для напоминаний</div></div>
        </div>
        <div class="settings-item" onclick="openRoutineManager()">
            <div class="settings-icon">📅</div>
            <div><div class="settings-label">Управление режимом дня</div><div class="settings-hint">Добавить/удалить пункты</div></div>
        </div>
        <div class="settings-item" onclick="if(confirm('Удалить ВСЕ данные? Это необратимо!')){localStorage.clear();appData=loadData();renderAll();forceCloseModal();showNotif('🗑 Все данные удалены');}">
            <div class="settings-icon">🗑</div>
            <div><div class="settings-label" style="color:var(--accent)">Сбросить все данные</div><div class="settings-hint">Удалить всё безвозвратно</div></div>
        </div>
        <div style="text-align:center;margin-top:16px;padding:10px;font-size:11px;color:var(--text-muted)">
            Моя Жизнь v2.0 • Данные хранятся локально
        </div>
    `);
}

function exportData() {
    const blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mylife_backup_${getToday()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showNotif('💾 Бэкап скачан!');
}

function importData(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            if(data.goals !== undefined) {
                appData = data;
                if(!appData.reminders) appData.reminders = [];
                saveData(appData);
                renderAll();
                showNotif('📂 Данные восстановлены!');
            } else {
                showNotif('❌ Неверный формат файла');
            }
        } catch(err) {
            showNotif('❌ Ошибка чтения файла');
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ===== ROUTINE MANAGER =====
function openRoutineManager() {
    forceCloseModal();
    const sorted = [...appData.routine].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    let h = '';
    sorted.forEach(r=>{
        h += `<div class="routine-item">
            <div class="routine-time">${r.time||'—'}</div>
            <div class="routine-desc">${r.title}</div>
            <button class="delete-btn" onclick="deleteRoutineItem('${r.id}');openRoutineManager();">✕</button>
        </div>`;
    });
    setTimeout(()=>{
        openModal(`<h2>📅 Режим дня</h2>
            <div id="routineListMgr">${h || '<div class="empty-state" style="padding:16px"><p>Пусто</p></div>'}</div>
            <div style="margin-top:10px">
                <div class="form-group"><label>Время</label><input type="time" id="newRoutineTime"></div>
                <div class="form-group"><label>Что делаем</label><input type="text" id="newRoutineTitle" placeholder="Например: Пробежка"></div>
                <button class="btn btn-primary" style="width:100%" onclick="addRoutineFromManager()">Добавить</button>
            </div>
            <div class="modal-actions"><button class="btn btn-secondary" onclick="forceCloseModal();renderAll();">Готово</button></div>`);
    }, 350);
}
function addRoutineFromManager() {
    const t=document.getElementById('newRoutineTitle').value.trim(); if(!t)return;
    appData.routine.push({id:uid(),title:t,time:document.getElementById('newRoutineTime').value,doneDates:[]});
    saveData(appData); openRoutineManager(); showNotif('📅 Пункт добавлен!');
}
function deleteRoutineItem(id) {
    appData.routine=appData.routine.filter(x=>x.id!==id); saveData(appData);
}

// ===== NOTIFICATIONS =====
function requestNotificationPermission() {
    if(!('Notification' in window)) { showNotif('❌ Уведомления не поддерживаются'); return; }
    Notification.requestPermission().then(p => {
        if(p==='granted') showNotif('🔔 Уведомления включены!');
        else showNotif('❌ Уведомления отклонены');
    });
}

// Check reminders every minute
function checkReminders() {
    if(!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    const currentTime = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const today = getToday();

    appData.reminders.forEach(r => {
        if(!r.active || !r.time) return;
        if(r.time === currentTime) {
            if(r.daily || !r.lastFired || r.lastFired !== today + '_' + currentTime) {
                new Notification('⚡ Моя Жизнь', { body: r.text, icon: '⚡', tag: r.id });
                r.lastFired = today + '_' + currentTime;
                saveData(appData);
            }
        }
    });
}
setInterval(checkReminders, 60000);
checkReminders();

// ===== RENDER ALL =====
function renderAll() {
    renderHome();
    renderGoals();
    renderHabits();
    renderAffirmations();
    renderReminders();
    renderJournal();
    renderAnalytics();
}
renderAll();

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
