<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARISE">
<meta name="theme-color" content="#050510">
<title>ARISE</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050510;--bg2:#08081a;--card:#0a0a2a;--card2:#0e0e35;--tx:#d0d0ff;--tx2:#7070aa;--tx3:#404066;--cyan:#00e5ff;--red:#ff1744;--purple:#aa44ff;--gold:#ffd740;--blue:#448aff;--green:#00e676;--orange:#ff9100;--brd:rgba(0,229,255,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding-bottom:70px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confetti{0%{transform:translateY(-100vh) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes xpPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.8)}}
@keyframes lvlUp{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{border-color:rgba(0,229,255,0.1)}50%{border-color:rgba(0,229,255,0.3)}}

.page{display:none;padding:8px 14px 14px;animation:fadeUp .3s ease}.page.active{display:block}

.hdr{padding:10px 14px 6px;padding-top:calc(10px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--brd)}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-row h1{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--cyan)}
.hdr-sub{font-size:9px;color:var(--tx3);letter-spacing:1px;margin-top:1px}
.hdr-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr-btn:active{opacity:.6}
.rank-row{display:flex;align-items:center;gap:6px;margin-top:5px}
.rank-badge{font-size:13px;font-weight:900;padding:2px 7px;border-radius:4px;letter-spacing:1px}
.rk-E{color:#8d6e63;background:rgba(141,110,99,0.12)}.rk-D{color:#42a5f5;background:rgba(66,165,245,0.12)}.rk-C{color:#ab47bc;background:rgba(171,71,188,0.12)}.rk-B{color:#ffd740;background:rgba(255,215,64,0.12)}.rk-A{color:#ff1744;background:rgba(255,23,68,0.12)}.rk-S{color:#00e5ff;background:rgba(0,229,255,0.15)}
.xp-track{flex:1;height:4px;background:var(--card);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .8s ease}
.xp-txt{font-size:8px;color:var(--tx3);white-space:nowrap}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:4px 0;padding-bottom:calc(4px + env(safe-area-inset-bottom,0px));z-index:50}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px;border:none;background:none;color:var(--tx3);font-size:8px;font-family:inherit;cursor:pointer;min-width:44px}
.nav-ic{font-size:18px;line-height:1}
.nav-i.on{color:var(--cyan)}

.st{font-size:13px;font-weight:700;margin:12px 0 5px;color:var(--cyan)}

.sys-box{border:1px solid rgba(0,229,255,0.08);border-radius:10px;padding:10px;margin-bottom:6px;background:rgba(0,229,255,0.02)}
.sys-label{font-size:9px;color:var(--cyan);font-weight:700;letter-spacing:1px;margin-bottom:4px}

.crd{background:var(--card);border-radius:10px;padding:10px;margin-bottom:5px;border:1px solid var(--brd);cursor:pointer}
.crd:active{background:var(--card2)}
.abtn{width:100%;padding:9px;border-radius:8px;border:1px dashed rgba(0,229,255,0.15);background:transparent;color:var(--cyan);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}
.abtn:active{background:rgba(0,229,255,0.04)}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.sbox{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:6px;text-align:center}
.sbox .v{font-size:16px;font-weight:800}.sbox .n{font-size:7px;color:var(--tx3);letter-spacing:.5px}

.qi{display:flex;align-items:center;gap:7px;padding:7px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:3px}
.qi.done{opacity:.5}
.qc{width:22px;height:22px;border-radius:4px;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:10px}
.qc.ok{background:var(--green);border-color:var(--green);color:var(--bg)}
.qi-info{flex:1}.qi-t{font-size:11px;font-weight:500}.qi-r{font-size:8px;color:var(--cyan)}

.boss{background:linear-gradient(135deg,#1a0000,#0a0020);border:1px solid rgba(255,23,68,0.12);border-radius:10px;padding:10px;margin-bottom:5px;cursor:pointer}
.boss:active{opacity:.8}
.boss .rk{font-size:8px;color:var(--orange);font-weight:700}.boss .nm{font-size:12px;font-weight:700;color:var(--red);margin-top:1px}
.hp-bar{width:100%;height:6px;background:rgba(255,23,68,0.1);border-radius:3px;margin-top:5px;overflow:hidden}
.hp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--orange));transition:width .5s}
.hp-txt{font-size:8px;color:var(--tx3);margin-top:1px;text-align:right}

.shgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px}
.shi{text-align:center;padding:6px 2px;background:var(--card);border:1px solid rgba(170,68,255,0.08);border-radius:6px}
.shi .ic{font-size:18px}.shi .nm{font-size:7px;color:var(--purple);margin-top:1px}

.dg{border:1px solid rgba(0,229,255,0.08);border-radius:8px;padding:8px;margin-bottom:4px;animation:glow 3s infinite}
.dg .rk{font-size:8px;font-weight:700}.dg .nm{font-size:11px;font-weight:600;margin-top:1px}
.dg .pr{font-size:8px;color:var(--tx2);margin-top:2px}
.dg-bar{width:100%;height:3px;background:var(--card);border-radius:2px;margin-top:2px;overflow:hidden}
.dg-fill{height:100%;border-radius:2px;background:var(--cyan)}

.ri{display:flex;align-items:center;gap:7px;padding:6px 8px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:3px}
.ri .tm{font-size:10px;font-weight:700;min-width:36px;color:var(--cyan)}.ri .ds{flex:1;font-size:11px}
.sw{width:34px;height:20px;border-radius:10px;background:var(--tx3);position:relative;cursor:pointer;flex-shrink:0}
.sw.on{background:var(--green)}
.sw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.sw.on::after{transform:translateX(14px)}

.rmi{display:flex;align-items:center;gap:7px;padding:6px 8px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:3px}
.rmi .mt{font-size:11px;font-weight:500}.rmi .ms{font-size:8px;color:var(--tx3)}

.je{padding:8px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:4px}
.je .dt{font-size:8px;color:var(--tx3);margin-bottom:1px}.je .tx{font-size:11px;line-height:1.3;color:var(--tx2)}

.af{background:rgba(170,68,255,0.03);border:1px solid rgba(170,68,255,0.08);border-radius:8px;padding:8px;margin-bottom:4px}
.af .at{font-size:11px;font-weight:500;line-height:1.3;padding-left:8px}
.af .aa{margin-top:4px}

.db{border:1px solid rgba(0,229,255,0.12);border-radius:8px;padding:8px;margin-bottom:6px;display:flex;align-items:center;gap:6px;cursor:pointer}
.db:active{opacity:.7}
.db .di{font-size:20px;animation:pulse 2s infinite}.db .dt2{flex:1}.db .dt2 .dtt{font-size:11px;font-weight:600;color:var(--cyan)}.db .dt2 .dts{font-size:9px;color:var(--tx2)}
.db .dbb{padding:4px 10px;border-radius:4px;border:none;background:var(--cyan);color:var(--bg);font-size:9px;font-weight:700;font-family:inherit;cursor:pointer}

.xbtn{padding:2px 6px;border-radius:3px;border:none;background:rgba(255,23,68,0.08);color:var(--red);font-size:8px;font-family:inherit;cursor:pointer}
.emp{text-align:center;padding:14px 10px;color:var(--tx3)}.emp .e{font-size:28px;margin-bottom:4px}.emp p{font-size:10px;line-height:1.2}

.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;justify-content:center;align-items:flex-end}
.mo.on{display:flex}
.ml{background:var(--bg2);border-radius:14px 14px 0 0;border-top:1px solid rgba(0,229,255,0.08);padding:10px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.mh{width:30px;height:3px;background:var(--tx3);border-radius:2px;margin:0 auto 8px}
.ml h2{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--cyan)}
.fg{margin-bottom:7px}
.fg label{display:block;font-size:9px;color:var(--tx2);margin-bottom:2px;font-weight:600}
.fg input,.fg textarea,.fg select{width:100%;padding:8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit;outline:none}
.fg textarea{min-height:44px;resize:none}
.ma{display:flex;gap:5px;margin-top:8px}
.bt{flex:1;padding:9px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
.bt:active{opacity:.7}
.bt-p{background:var(--cyan);color:var(--bg);font-weight:700}
.bt-s{background:var(--card);color:var(--tx2)}

.si{display:flex;align-items:center;gap:7px;padding:8px;background:var(--card);border:1px solid var(--brd);border-radius:6px;margin-bottom:3px;cursor:pointer}
.si:active{opacity:.7}
.si-i{font-size:16px}.si-l{flex:1;font-size:11px;font-weight:500}

.sli{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--brd);font-size:10px}
.sli:last-child{border-bottom:none}
.sck{width:16px;height:16px;border-radius:3px;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:8px}
.sck.ok{background:var(--green);border-color:var(--green);color:var(--bg)}
.stx{flex:1}.stx.dt{text-decoration:line-through;opacity:.4}
.qas{display:flex;gap:3px;margin-top:3px}
.qas input{flex:1;padding:5px 7px;border-radius:4px;border:1px solid var(--brd);background:var(--bg);color:var(--tx);font-size:10px;font-family:inherit;outline:none}
.qas button{padding:5px 8px;border-radius:4px;border:none;background:var(--cyan);color:var(--bg);font-size:10px;font-family:inherit;cursor:pointer}

.rv-h{text-align:center;padding:6px 0 10px}.rv-h .e{font-size:36px;margin-bottom:4px}.rv-h h2{font-size:16px;font-weight:700;color:var(--cyan)}.rv-h p{font-size:11px;color:var(--tx2);margin-top:2px}
.rv-s{margin-bottom:8px}
.rv-s label{display:block;font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600}
.rv-s textarea,.rv-s input[type=text]{width:100%;padding:8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--tx);font-size:12px;font-family:inherit;outline:none}
.rv-s textarea{min-height:40px;resize:none}

.ac{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:8px;margin-bottom:5px}
.ac-t{font-size:10px;font-weight:600;margin-bottom:3px;color:var(--tx2)}
.abr{display:flex;align-items:flex-end;gap:2px;height:60px}
.abc{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.ab{width:100%;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--cyan),var(--purple));min-height:2px;transition:height .5s}
.abv{font-size:6px;color:var(--tx2);font-weight:600}.abl{font-size:6px;color:var(--tx3)}
.ar{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--brd)}
.ar:last-child{border-bottom:none}
.arl{font-size:10px;color:var(--tx2)}.arv{font-size:11px;font-weight:700}

.ntf{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px;padding-top:calc(8px + env(safe-area-inset-top,0px));background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--bg);z-index:3000;display:none;text-align:center;font-size:11px;font-weight:700}
.ntf.on{display:block}
.xpp{position:fixed;z-index:9998;pointer-events:none;font-size:14px;font-weight:800;color:var(--gold);animation:xpPop 1s ease-out forwards;text-shadow:0 0 8px rgba(255,215,64,0.5)}
.cfp{position:fixed;border-radius:2px;z-index:9999;pointer-events:none;animation:confetti 2.5s ease-in forwards}
.luo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:10000;justify-content:center;align-items:center;flex-direction:column}
.luo.on{display:flex}
.luo .lt{font-size:36px;font-weight:900;color:var(--cyan);animation:lvlUp .6s ease;letter-spacing:3px}
.luo .ls{font-size:13px;color:var(--tx2);margin-top:4px}
.luo .lb{margin-top:14px;padding:8px 30px;border-radius:6px;border:1px solid var(--cyan);background:transparent;color:var(--cyan);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<div class="ntf" id="ntf"></div>

<div class="luo" id="luOv">
<div class="lt" id="luT">ARISE</div>
<div class="ls" id="luS"></div>
<button class="lb" id="luBtn">ПРОДОЛЖИТЬ</button>
</div>

<div class="app">

<div class="hdr">
<div class="hdr-row">
<div><h1>⚡ ARISE</h1><div class="hdr-sub" id="hSub"></div></div>
<div style="display:flex;gap:4px">
<button class="hdr-btn" id="btnReview">🌅</button>
<button class="hdr-btn" id="btnSettings">⚙️</button>
</div>
</div>
<div class="rank-row">
<div class="rank-badge" id="rkBadge">E</div>
<div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
<div class="xp-txt" id="xpTxt">0 XP</div>
</div>
</div>

<div class="page active" id="pg-home"><div id="homeC"></div></div>
<div class="page" id="pg-quests"><div id="questsC"></div></div>
<div class="page" id="pg-goals"><div id="goalsC"></div></div>
<div class="page" id="pg-mind">
<div class="st">🧠 Установки</div><div id="affC"></div><button class="abtn" id="btnAddAff">+ Установка</button>
<div class="st">⏰ Напоминания</div><div id="remC"></div><button class="abtn" id="btnAddRem" style="margin-top:4px">+ Напоминание</button>
<div class="st">📔 Дневник</div><div id="journC"></div><button class="abtn" id="btnAddJourn" style="margin-top:4px">+ Мысль</button>
</div>
<div class="page" id="pg-stats"><div id="statsC"></div></div>

<div class="nav">
<button class="nav-i on" data-p="home"><span class="nav-ic">🏠</span><span>Статус</span></button>
<button class="nav-i" data-p="quests"><span class="nav-ic">⚔️</span><span>Квесты</span></button>
<button class="nav-i" data-p="goals"><span class="nav-ic">👹</span><span>Боссы</span></button>
<button class="nav-i" data-p="mind"><span class="nav-ic">🧠</span><span>Разум</span></button>
<button class="nav-i" data-p="stats"><span class="nav-ic">📊</span><span>Лог</span></button>
</div>

</div>

<div class="mo" id="mOv">
<div class="ml"><div class="mh"></div><div id="mBd"></div></div>
</div>

<input type="file" id="impF" accept=".json" style="display:none">

<script>
// ====== HELPERS: no inline onclick, use addEventListener ======

function $(id){return document.getElementById(id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function today(){return new Date().toISOString().split("T")[0]}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// ====== DATA ======
function loadD(){
  try{var r=localStorage.getItem("arise5");if(r)return JSON.parse(r)}catch(e){}
  return{goals:[],habits:[],affirms:[],journal:[],routine:[],reminders:[],dailyQuests:[],dungeons:[],shadows:[]}
}
function saveD(){localStorage.setItem("arise5",JSON.stringify(D))}

function loadXP(){
  try{var r=localStorage.getItem("arise5_xp");if(r)return JSON.parse(r)}catch(e){}
  return{total:0,today:0,lastDate:"",dailyDate:"",stats:{str:10,agi:10,int:10,end:10,per:10,wil:10}}
}
function saveXP(){localStorage.setItem("arise5_xp",JSON.stringify(X))}

var D=loadD();
var X=loadXP();

// ====== QUOTES ======
var QS=[
"Вставай. Тебе не нужно быть тем, кого создали другие.",
"Слабость — это выбор. Сила — тоже.",
"Уровень — это не просто число. Это доказательство твоей боли.",
"ARISE. Восстань из тьмы.",
"Дисциплина — мост между целями и достижениями.",
"Я один справлюсь.",
"Каждый день ты выбираешь: быть жертвой или охотником.",
"Привычки формируют характер. Характер — судьбу.",
"Мотивация начинается. Привычка заставляет продолжать.",
"Секрет успеха — начать.",
"Путь в тысячу миль начинается с одного шага.",
"Не завтра. Не потом. Сейчас.",
"Боль сегодня — сила завтра.",
"Первый шаг к силе — признать свою слабость.",
"Твои тени — твои побеждённые слабости.",
"Лучшее время начать — сейчас.",
"Не бойся идти медленно, бойся стоять на месте.",
"Невозможно — это всего лишь мнение.",
"Тот, кто побеждает себя, сильнейший из воинов.",
"Будь изменением, которое хочешь увидеть.",
"Успех — сумма маленьких усилий каждый день.",
"Если можешь мечтать — можешь это сделать.",
"Когда мир против тебя — самолёт взлетает против ветра.",
"Сегодня — лучший день, чтобы начать.",
"Твои привычки — твои теневые воины.",
"Каждое утро мы рождаемся заново.",
"Первый шаг сделан. Остальные будет легче.",
"Делай что можешь, с тем что имеешь, там где ты есть.",
"Мы — то, что постоянно делаем.",
"Вставай. Охота начинается."
];
function getQuote(){var d=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);return QS[d%QS.length]}

// ====== RANK ======
var RANKS=[{r:"E",min:0},{r:"D",min:100},{r:"C",min:350},{r:"B",min:700},{r:"A",min:1200},{r:"S",min:2000}];
function getRank(){var r=RANKS[0];for(var i=0;i<RANKS.length;i++){if(X.total>=RANKS[i].min)r=RANKS[i]}return r}
var XPLV=[0,50,120,220,350,520,730,1000,1350,1800,2400,3200,4200,5500,7000,9000];
function getLv(){var l=1;for(var i=0;i<XPLV.length;i++){if(X.total>=XPLV[i])l=i+1}return l}
function getLvPct(){var l=getLv();var c=XPLV[l-1]||0;var n=XPLV[l]||(XPLV[XPLV.length-1]+5000);return Math.round((X.total-c)/(n-c)*100)}

// ====== STATS ======
var STATS=[{k:"str",n:"СИЛ",i:"⚔️"},{k:"agi",n:"ЛОВ",i:"🏃"},{k:"int",n:"ИНТ",i:"🧠"},{k:"end",n:"ВЫН",i:"❤️"},{k:"per",n:"ВОС",i:"👁️"},{k:"wil",n:"ВОЛЯ",i:"💎"}];

function addXP(amt,el){
  var oldR=getRank().r;
  X.total+=amt;
  var td=today();
  if(X.lastDate!==td){X.today=0;X.lastDate=td}
  X.today+=amt;
  saveXP();
  renderXPBar();
  showXPPop(amt,el);
  var newR=getRank().r;
  if(newR!==oldR){setTimeout(function(){showLvlUp(newR)},600)}
}

function showXPPop(amt,el){
  var p=document.createElement("div");
  p.className="xpp";
  p.textContent="+"+amt+" XP";
  var x=window.innerWidth/2, y=180;
  if(el&&el.getBoundingClientRect){var r=el.getBoundingClientRect();x=r.left+r.width/2;y=r.top}
  p.style.left=x+"px";p.style.top=y+"px";
  document.body.appendChild(p);
  setTimeout(function(){p.remove()},1200);
}

function showLvlUp(rk){
  $("luT").textContent="РАНГ "+rk;
  $("luS").textContent="Система зафиксировала рост.";
  $("luOv").classList.add("on");
  spawnConf();
}

function spawnConf(){
  var cs=["#00e5ff","#ff1744","#ffd740","#aa44ff","#00e676","#ff9100"];
  for(var i=0;i<25;i++){
    var c=document.createElement("div");c.className="cfp";
    c.style.left=Math.random()*100+"vw";
    c.style.background=cs[Math.floor(Math.random()*cs.length)];
    c.style.animationDelay=Math.random()*0.5+"s";
    c.style.animationDuration=(2+Math.random())+"s";
    c.style.width=(3+Math.random()*6)+"px";
    c.style.height=(3+Math.random()*6)+"px";
    document.body.appendChild(c);
    (function(el){setTimeout(function(){el.remove()},3500)})(c);
  }
}

function showNtf(t){var b=$("ntf");b.textContent=t;b.classList.add("on");setTimeout(function(){b.classList.remove("on")},2500)}

// ====== STREAK ======
function getStreak(h){
  if(!h.doneDates||!h.doneDates.length)return 0;
  var s=h.doneDates.slice().sort().reverse();
  var d=new Date();var streak=0;
  for(var i=0;i<365;i++){
    var ds=d.toISOString().split("T")[0];
    if(s.indexOf(ds)>=0){streak++;d.setDate(d.getDate()-1)}
    else{if(i===0){d.setDate(d.getDate()-1);continue}break}
  }
  return streak;
}

function togDQ(id,el){
  var td=today();
  var q=(D.dailyQuests||[]).filter(function(x){return x.id===id})[0];
  if(!q)return;
  if(!q.doneDates)q.doneDates=[];
  var i=q.doneDates.indexOf(td);
  if(i>=0){q.doneDates.splice(i,1)}
  else{
    q.doneDates.push(td);
    addXP(q.xp||XPR.quest,el);
    if(q.stat&&X.stats[q.stat]!==undefined){X.stats[q.stat]+=q.statAmt||2;saveXP()}
    spawnConf();
    // Check all done
    var allDone=(D.dailyQuests||[]).every(function(qq){return qq.doneDates&&qq.doneDates.indexOf(td)>=0});
    if(allDone&&D.dailyQuests.length>=3){addShadow("Все квесты дня");showNtf("🖤 Новый тень!")}
  }
  saveD();renderAll();
}

function togRut(id){
  var td=today();
  var r=D.routine.filter(function(x){return x.id===id})[0];
  if(!r)return;
  if(!r.doneDates)r.doneDates=[];
  var i=r.doneDates.indexOf(td);
  if(i>=0)r.doneDates.splice(i,1);
  else{r.doneDates.push(td);addXP(XPR.routine,null)}
  saveD();renderAll();
}

  var g=D.goals.filter(function(x){return x.id===id})[0];if(!g)return;
  var s=g.steps||[];
  var h='<h2>👹 '+esc(g.title)+'</h2>';
  if(g.description)h+='<p style="color:var(--tx2);font-size:10px;margin-bottom:6px">'+esc(g.description)+'</p>';
  h+='<div class="sys-label">ФАЗЫ БОССА</div>';
  for(var i=0;i<s.length;i++){
    h+='<div class="sli"><div class="sck '+(s[i].done?"ok":"")+'" data-sidx="'+i+'">'+(s[i].done?"✓":"")+'</div>';
    h+='<div class="stx '+(s[i].done?"dt":"")+'">'+esc(s[i].text)+'</div>';
    h+='<button class="xbtn" data-dels="'+i+'">✕</button></div>';
  }
  h+='<div class="qas"><input type="text" id="nsT" placeholder="Новая фаза..."><button id="nsBtn">+</button></div>';
  h+='<div class="ma"><button class="bt bt-s" id="gClose">Закрыть</button></div>';
  openM(h);

  $("gClose").addEventListener("click",closeM);
  $("nsBtn").addEventListener("click",function(){
    var t=$("nsT").value.trim();if(!t)return;
    if(!g.steps)g.steps=[];g.steps.push({text:t,done:false});saveD();openGD(id);renderGoals();
  });

  var scks=document.querySelectorAll("[data-sidx]");
  for(var i=0;i<scks.length;i++){
    (function(el){el.addEventListener("click",function(){
      var idx=parseInt(el.getAttribute("data-sidx"));
      g.steps[idx].done=!g.steps[idx].done;saveD();
      if(g.steps[idx].done){
        addXP(XPR.step,el);
        var allD=g.steps.every(function(s){return s.done});
        if(allD){addShadow(g.title);showNtf("👹 Босс повержен!");spawnConf()}
      }
      openGD(id);renderGoals();
    })})(scks[i]);
  }

  var dels=document.querySelectorAll("[data-dels]");
  for(var i=0;i<dels.length;i++){
    (function(el){el.addEventListener("click",function(){
      var idx=parseInt(el.getAttribute("data-dels"));
      g.steps.splice(idx,1);saveD();openGD(id);renderGoals();
    })})(dels[i]);
  }
}

// ====== REVIEW ======
function openReview(){
  var td=today();var hr=new Date().getHours();var isM=hr<14;
  var ex=D.journal.filter(function(j){return j.date===td&&j.isRev})[0];
  var rd=ex?JSON.parse(ex.revData||"{}"):{};

  var h='<div class="rv-h"><div class="e">'+(isM?"🌅":"🌙")+'</div><h2>'+(isM?"Утренний рапорт":"Вечерний отчёт")+'</h2><p>'+(isM?"Настрой день":"Оцени день")+'</p></div>';

  if(isM){
    h+='<div class="rv-s"><label>🙏 Благодарен за</label><textarea id="rv1">'+(rd.grateful||"")+'</textarea></div>';
    h+='<div class="rv-s"><label>🎯 Главная задача</label><input type="text" id="rv2" value="'+(rd.main||"")+'"></div>';
    h+='<div class="rv-s"><label>💡 Установка</label><textarea id="rv3">'+(rd.affirmation||"")+'</textarea></div>';
  }else{
    h+='<div class="rv-s"><label>⭐ Что хорошо?</label><textarea id="rv1">'+(rd.good||"")+'</textarea></div>';
    h+='<div class="rv-s"><label>🔄 Улучшить?</label><textarea id="rv2">'+(rd.improve||"")+'</textarea></div>';
    h+='<div class="rv-s"><label>💪 Горжусь?</label><textarea id="rv3">'+(rd.proud||"")+'</textarea></div>';
  }
  h+='<div class="ma"><button class="bt bt-s" id="rvSkip">Пропустить</button><button class="bt bt-p" id="rvOk">Сохранить +'+XPR.review+'XP</button></div>';
  openM(h);

  $("rvSkip").addEventListener("click",closeM);
  $("rvOk").addEventListener("click",function(){
    var rd2={};
    if(isM){rd2.grateful=$("rv1").value;rd2.main=$("rv2").value;rd2.affirmation=$("rv3").value}
    else{rd2.good=$("rv1").value;rd2.improve=$("rv2").value;rd2.proud=$("rv3").value}
    if(ex){ex.revData=JSON.stringify(rd2)}
    else{D.journal.push({id:uid(),text:isM?"🌅 Рапорт":"🌙 Отчёт",mood:"",date:today(),time:new Date().getHours().toString().padStart(2,"0")+":"+new Date().getMinutes().toString().padStart(2,"0"),isRev:true,revData:JSON.stringify(rd2)})}
    saveD();addXP(XPR.review,null);closeM();renderAll();showNtf(isM?"🌅 Принято!":"🌙 Записано!");
  });
}

    h+='<div class="ac"><div class="ac-t">🔥 Серии</div>';

// ====== SETTINGS ======
function openSettings(){
  openM('<h2>⚙️ Система</h2>'+
  '<div class="si" id="sExport"><div class="si-i">💾</div><div class="si-l">Экспорт</div></div>'+
  '<div class="si" id="sImport"><div class="si-i">📂</div><div class="si-l">Импорт</div></div>'+
  '<div class="si" id="sRut"><div class="si-i">📅</div><div class="si-l">Режим дня</div></div>'+
  '<div class="si" id="sHab"><div class="si-i">✅</div><div class="si-l">Привычки</div></div>'+
  '<div class="si" id="sReset"><div class="si-i">🗑</div><div class="si-l" style="color:var(--red)">Сбросить всё</div></div>'+
  '<div style="text-align:center;margin-top:8px;font-size:8px;color:var(--tx3)">ARISE v4.0 | '+X.total+' XP | Ранг '+getRank().r+'</div>');

  $("sExport").addEventListener("click",function(){
    var b=new Blob([JSON.stringify({D:D,X:X},null,2)],{type:"application/json"});
    var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="arise_"+today()+".json";a.click();
    showNtf("💾 Скачано!");
  });

  $("sImport").addEventListener("click",function(){
    closeM();
    var inp=$("impF");
    inp.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      var r=new FileReader();
      r.onload=function(ev){
        try{
          var d=JSON.parse(ev.target.result);
          if(d.D){D=d.D;if(!D.shadows)D.shadows=[];if(!D.dailyQuests)D.dailyQuests=[];if(!D.dungeons)D.dungeons=[]}
          if(d.X){X=d.X;saveXP()}
          saveD();renderAll();renderXPBar();showNtf("📂 Восстановлено!");
        }catch(err){showNtf("❌ Ошибка")}
      };
      r.readAsText(f);inp.value="";
    };
    inp.click();
  });

  $("sRut").addEventListener("click",function(){closeM();openRutMgr()});
  $("sHab").addEventListener("click",function(){closeM();openHabMgr()});

  $("sReset").addEventListener("click",function(){
    if(!confirm("Удалить ВСЕ данные?"))return;
    localStorage.removeItem("arise5");localStorage.removeItem("arise5_xp");
    D=loadD();X=loadXP();closeM();renderAll();renderXPBar();showNtf("🗑 Сброшено");
  });
}

function openRutMgr(){
  var sorted=(D.routine||[]).slice().sort(function(a,b){return(a.time||"").localeCompare(b.time||"")});
  var h='<h2>📅 Режим дня</h2>';
  for(var i=0;i<sorted.length;i++){
    h+='<div class="ri"><div class="tm">'+(sorted[i].time||"—")+'</div><div class="ds">'+esc(sorted[i].title)+'</div><button class="xbtn" data-delrut="'+sorted[i].id+'">✕</button></div>';
  }
  h+='<div class="fg" style="margin-top:6px"><label>Время</label><input type="time" id="nrT"></div>';
  h+='<div class="fg"><label>Действие</label><input type="text" id="nrTl" placeholder="Пробежка"></div>';
  h+='<button class="bt bt-p" style="width:100%" id="nrOk">Добавить</button>';
  h+='<div class="ma"><button class="bt bt-s" id="nrClose">Готово</button></div>';
  openM(h);

  $("nrClose").addEventListener("click",function(){closeM();renderAll()});
  $("nrOk").addEventListener("click",function(){
    var t=$("nrTl").value.trim();if(!t)return;
    D.routine.push({id:uid(),title:t,time:$("nrT").value,doneDates:[]});saveD();openRutMgr();
  });

  var dels=document.querySelectorAll("[data-delrut]");
  for(var i=0;i<dels.length;i++){
    (function(el){el.addEventListener("click",function(){
      var id=el.getAttribute("data-delrut");
      D.routine=D.routine.filter(function(x){return x.id!==id});saveD();openRutMgr();
    })})(dels[i]);
  }
}

function openHabMgr(){
  var habs=D.habits||[];
  var h='<h2>✅ Привычки</h2>';
  for(var i=0;i<habs.length;i++){
    h+='<div class="ri"><div class="ds">'+esc(habs[i].title)+'</div><div style="font-size:9px;color:var(--gold)">🔥'+getStreak(habs[i])+'</div><button class="xbtn" data-delhab="'+habs[i].id+'">✕</button></div>';

  h+='<div class="fg" style="margin-top:6px"><label>Название</label><input type="text" id="nhT" placeholder="Медитация 10 мин"></div>';
  h+='<button class="bt bt-p" style="width:100%" id="nhOk">Добавить</button>';
  h+='<div class="ma"><button class="bt bt-s" id="nhClose">Готово</button></div>';
  openM(h);

  $("nhClose").addEventListener("click",function(){closeM();renderAll()});
  $("nhOk").addEventListener("click",function(){
    var t=$("nhT").value.trim();if(!t)return;
    D.habits.push({id:uid(),title:t,doneDates:[]});saveD();openHabMgr();
  });

  var dels=document.querySelectorAll("[data-delhab]");
  for(var i=0;i<dels.length;i++){
    (function(el){el.addEventListener("click",function(){
      var id=el.getAttribute("data-delhab");
      D.habits=D.habits.filter(function(x){return x.id!==id});saveD();openHabMgr();
    })})(dels[i]);
  }
}

// ====== NOTIFICATIONS ======
if("Notification" in window){
  setInterval(function(){
    if(Notification.permission!=="granted")return;
    var now=new Date();var ct=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    var td=today();
    for(var i=0;i<D.reminders.length;i++){
      var r=D.reminders[i];
      if(!r.active||!r.time||r.time!==ct)continue;
      var key=td+"_"+ct;
      if(r.lastFired!==key){new Notification("⚡ ARISE",{body:r.text});r.lastFired=key;saveD()}
    }
  },60000);
}

// ====== INIT ======
renderAll();
renderXPBar();

if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){})}
</script>
