function getRank(){var r=RANKS[0];for(var i=0;i<RANKS.length;i++){if(X.total>=RANKS[i].min)r=RANKS[i]}return r}

function getLvPct(){var l=getLv();var c=XPLV[l-1]||0;var n=XPLV[l]||(XPLV[XPLV.length-1]+5000);return Math.round((X.total-c)/(n-c)*100)}

function openRutMgr(){var sorted=(D.routine||[]).slice().sort(function(a,b){return(a.time||"").localeCompare(b.time||"")});var h='<h2>📅 Режим</h2>';for(var i=0;i<sorted.length;i++)h+='<div class="ri"><div class="tm">'+(sorted[i].time||"—")+'</div><div class="ds">'+esc(sorted[i].title)+'</div><button class="xbtn" data-delrut="'+sorted[i].id+'">✕</button></div>';h+='<div class="fg" style="margin-top:6px"><label>Время</label><input type="time" id="nrT"></div><div class="fg"><label>Действие</label><input type="text" id="nrTl" placeholder="Пробежка"></div><button class="bt bt-p" style="width:100%" id="nrO">Добавить</button><div class="ma"><button class="bt bt-s" id="nrC">Готово</button></div>';openM(h);$("nrC").addEventListener("click",function(){closeM();renderAll()});$("nrO").addEventListener("click",function(){var t=$("nrTl").value.trim();if(!t)return;D.routine.push({id:uid(),title:t,time:$("nrT").value,doneDates:[]});saveD();openRutMgr()});var dr=document.querySelectorAll("[data-delrut]");for(var i=0;i<dr.length;i++){(function(el){el.addEventListener("click",function(){D.routine=D.routine.filter(function(x){return x.id!==el.getAttribute("data-delrut")});saveD();openRutMgr()})})(dr[i])}}
function openHabMgr(){var habs=D.habits||[];var h='<h2>✅ Привычки</h2>';for(var i=0;i<habs.length;i++)h+='<div class="ri"><div class="ds">'+esc(habs[i].title)+'</div><div style="font-size:9px;color:var(--gold)">🔥'+getStreak(habs[i])+'</div><button class="xbtn" data-delhab="'+habs[i].id+'">✕</button></div>';h+='<div class="fg" style="margin-top:6px"><label>Название</label><input type="text" id="nhT" placeholder="Медитация 10 мин"></div><button class="bt bt-p" style="width:100%" id="nhO">Добавить</button><div class="ma"><button class="bt bt-s" id="nhC">Готово</button></div>';openM(h);$("nhC").addEventListener("click",function(){closeM();renderAll()});$("nhO").addEventListener("click",function(){var t=$("nhT").value.trim();if(!t)return;D.habits.push({id:uid(),title:t,doneDates:[]});saveD();openHabMgr()});var dh=document.querySelectorAll("[data-delhab]");for(var i=0;i<dh.length;i++){(function(el){el.addEventListener("click",function(){D.habits=D.habits.filter(function(x){return x.id!==el.getAttribute("data-delhab")});saveD();openHabMgr()})})(dh[i])}}
// CATALOG
function openCatalog(){var h='<h2>📚 Библиотека</h2><div style="display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap">';var tabs=[{k:"quests",l:"⚔️ Квесты"},{k:"bosses",l:"👹 Боссы"},{k:"dungeons",l:"🏰 Подземелья"},{k:"affirms",l:"🧠 Установки"},{k:"habits",l:"✅ Привычки"}];for(var i=0;i<tabs.length;i++){var act=catTab===tabs[i].k?"bt-p":"bt-s";h+='<button class="bt '+act+'" style="flex:1;padding:6px;font-size:9px;min-width:55px" data-cattab="'+tabs[i].k+'">'+tabs[i].l+'</button>'}h+='</div><div id="catC">'+getCatC(catTab)+'</div><div class="ma"><button class="bt bt-s" id="catCl">Закрыть</button></div>';openM(h);for(var i=0;i<tabs.length;i++){(function(tb){var el=document.querySelector('[data-cattab="'+tb.k+'"]');if(el)el.addEventListener("click",function(){catTab=tb.k;openCatalog()})})(tabs[i])}$("catCl").addEventListener("click",closeM);attachCatE()}
function getCatC(tab){var h="";if(tab==="quests"){var sks=["str","agi","int","end","per","wil"];var sns={str:"⚔️ СИЛ",agi:"🏃 ЛОВ",int:"🧠 ИНТ",end:"❤️ ВЫН",per:"👁️ ВОС",wil:"💎 ВОЛЯ"};for(var si=0;si<sks.length;si++){var sk=sks[si];var ql=CATALOG.quests[sk];h+='<div style="font-size:10px;font-weight:700;color:var(--cyan);margin:6px 0 3px;border-bottom:1px solid var(--brd);padding-bottom:3px">'+sns[sk]+" ("+ql.length+')</div>';for(var i=0;i<ql.length;i++){h+='<div class="qi"><div class="qi-info"><div class="qi-t">'+esc(ql[i].t)+'</div><div class="qi-r">+'+ql[i].xp+" XP | +"+ql[i].a+" "+sns[sk].split(" ")[1]+'</div></div><button class="bt bt-p" style="flex:0;padding:4px 10px;font-size:9px" data-addq="'+sk+":"+i+'">+</button></div>'}}}else if(tab==="bosses"){var cks=["health","finance","relationship","career","growth"];var cns={health:"💪 Здоровье",finance:"💰 Финансы",relationship:"❤️ Отношения",career:"💼 Карьера",growth:"📚 Развитие"};for(var ci=0;ci<cks.length;ci++){var ck=cks[ci];var bl=CATALOG.bosses[ck];h+='<div style="font-size:10px;font-weight:700;color:var(--red);margin:6px 0 3px;border-bottom:1px solid var(--brd);padding-bottom:3px">'+cns[ck]+" ("+bl.length+')</div>';for(var i=0;i<bl.length;i++){var s=bl[i].s||[];var rk=s.length<=3?"E":s.length<=5?"D":s.length<=7?"C":s.length<=10?"B":"A";h+='<div class="boss" style="cursor:default"><div class="rk">'+rk+"-ранг | "+s.length+" фаз</div><div class=\"nm\" style=\"font-size:11px\">"+esc(bl[i].t)+'</div><div style="font-size:9px;color:var(--tx2);margin-top:2px">';for(var j=0;j<Math.min(s.length,3);j++)h+="&#8226; "+esc(s[j])+"<br>";if(s.length>3)h+="... +"+(s.length-3);h+='</div><button class="bt bt-p" style="width:100%;padding:5px;font-size:9px;margin-top:4px" data-addb="'+ck+":"+i+'">Вызвать</button></div>'}}}else if(tab==="dungeons"){var rks=["E","D","C","B","A","S"];var rcl={E:"#8d6e63",D:"#42a5f5",C:"#ab47bc",B:"#ffd740",A:"#ff1744",S:"#00e5ff"};for(var ri=0;ri<rks.length;ri++){var rk=rks[ri];var dl=CATALOG.dungeons.filter(function(x){return x.r===rk});if(!dl.length)continue;h+='<div style="font-size:10px;font-weight:700;color:'+rcl[rk]+';margin:6px 0 3px;border-bottom:1px solid var(--brd);padding-bottom:3px">'+rk+"-ранг ("+dl.length+')</div>';for(var i=0;i<dl.length;i++){h+='<div class="dg" style="cursor:default"><div class="nm" style="font-size:11px">'+esc(dl[i].t)+'</div><div class="pr">'+dl[i].d+" дней</div><button class=\"bt bt-p\" style=\"width:100%;padding:5px;font-size:9px;margin-top:3px\" data-adddg=\""+rk+":"+i+'">Открыть</button></div>'}}}else if(tab==="affirms"){h+='<div style="font-size:9px;color:var(--tx2);margin-bottom:5px">Нажми чтобы добавить</div><button class="bt bt-p" style="width:100%;padding:7px;font-size:10px;margin-bottom:5px" id="allAff">Все ('+CATALOG.affirms.length+')</button>';for(var i=0;i<CATALOG.affirms.length;i++)h+='<div class="af" style="cursor:pointer" data-adda="'+i+'"><div class="at" style="padding-left:8px;font-size:11px">'+esc(CATALOG.affirms[i])+'</div></div>'}else if(tab==="habits"){h+='<div style="font-size:9px;color:var(--tx2);margin-bottom:5px">Нажми чтобы добавить</div><button class="bt bt-p" style="width:100%;padding:7px;font-size:10px;margin-bottom:5px" id="allHab">Все ('+CATALOG.habits.length+')</button>';var sn2={str:"⚔️",agi:"🏃",int:"🧠",end:"❤️",per:"👁️",wil:"💎"};for(var i=0;i<CATALOG.habits.length;i++){var hb=CATALOG.habits[i];h+='<div class="qi" style="cursor:pointer" data-addh="'+i+'"><div class="qi-info"><div class="qi-t">'+esc(hb.t)+'</div><div class="qi-r">'+(sn2[hb.s]||"")+'</div></div><button class="bt bt-p" style="flex:0;padding:3px 8px;font-size:9px">+</button></div>'}}return h}
function attachCatE(){var qB=document.querySelectorAll("[data-addq]");for(var i=0;i<qB.length;i++){(function(el){el.addEventListener("click",function(){var p=el.getAttribute("data-addq").split(":");var sk=p[0];var idx=parseInt(p[1]);var q=CATALOG.quests[sk][idx];if(!D.dailyQuests)D.dailyQuests=[];var sn="";for(var j=0;j<STATS.length;j++)if(STATS[j].k===sk)sn=STATS[j].n;D.dailyQuests.push({id:uid(),title:q.t,xp:q.xp,stat:sk,statAmt:q.a,statName:sn,doneDates:[]});saveD();el.textContent="✓";el.style.background="var(--green)";showNtf("⚔️ Добавлен!")})})(qB[i])}var bB=document.querySelectorAll("[data-addb]");for(var i=0;i<bB.length;i++){(function(el){el.addEventListener("click",function(){var p=el.getAttribute("data-addb").split(":");var ck=p[0];var idx=parseInt(p[1]);var b=CATALOG.bosses[ck][idx];var steps=[];for(var j=0;j<b.s.length;j++)steps.push({text:b.s[j],done:false});D.goals.push({id:uid(),title:b.t,description:"",category:ck,steps:steps,createdAt:today()});saveD();addXP(XPR.goal,el);el.textContent="✓";el.style.background="var(--green)";showNtf("👹 Призван!")})})(bB[i])}var dB=document.querySelectorAll("[data-adddg]");for(var i=0;i<dB.length;i++){(function(el){el.addEventListener("click",function(){var p=el.getAttribute("data-adddg").split(":");var rk=p[0];var idx=parseInt(p[1]);var dl=CATALOG.dungeons.filter(function(x){return x.r===rk});var dg=dl[idx];if(!D.dungeons)D.dungeons=[];D.dungeons.push({id:uid(),title:dg.t,total:dg.d,progress:0,rank:dg.r});saveD();el.textContent="✓";el.style.background="var(--green)";showNtf("🏰 Открыто!")})})(dB[i])}var aB=document.querySelectorAll("[data-adda]");for(var i=0;i<aB.length;i++){(function(el){el.addEventListener("click",function(){var idx=parseInt(el.getAttribute("data-adda"));D.affirms.push({id:uid(),text:CATALOG.affirms[idx]});saveD();el.style.opacity="0.3";el.style.borderLeft="3px solid var(--green)";showNtf("🧠 Добавлено!")})})(aB[i])}var aa=document.getElementById("allAff");if(aa)aa.addEventListener("click",function(){for(var i=0;i<CATALOG.affirms.length;i++)D.affirms.push({id:uid(),text:CATALOG.affirms[i]});saveD();showNtf("🧠 Все!");openCatalog()});var hB=document.querySelectorAll("[data-addh]");for(var i=0;i<hB.length;i++){(function(el){el.addEventListener("click",function(){var idx=parseInt(el.getAttribute("data-addh"));D.habits.push({id:uid(),title:CATALOG.habits[idx].t,doneDates:[]});saveD();el.style.opacity="0.4";el.querySelector(".bt").textContent="✓";showNtf("✅ Добавлено!")})})(hB[i])}var ah=document.getElementById("allHab");if(ah)ah.addEventListener("click",function(){for(var i=0;i<CATALOG.habits.length;i++)D.habits.push({id:uid(),title:CATALOG.habits[i].t,doneDates:[]});saveD();showNtf("✅ Все!");openCatalog()})}
// NOTIFICATIONS
if("Notification" in window)setInterval(function(){if(Notification.permission!=="granted")return;var now=new Date();var ct=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");var td=today();for(var i=0;i<D.reminders.length;i++){var r=D.reminders[i];if(!r.active||!r.time||r.time!==ct)continue;var key=td+"_"+ct;if(r.lastFired!==key){new Notification("⚡ ARISE",{body:r.text});r.lastFired=key;saveD()}}},60000);
// INIT
renderAll();renderXPBar();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(function(){});
</script></body></html>
