<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Моя Жизнь">
<meta name="theme-color" content="#080818">
<title>Моя Жизнь</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080818;--bg2:#0e0e28;--card:#141440;--card2:#1a1a50;--tx:#e8e8f8;--tx2:#8888bb;--tx3:#555580;--red:#ff2255;--red2:#ff5577;--grn:#00dd66;--ylw:#ffcc00;--blu:#3388ff;--prp:#aa66ff;--org:#ff8800;--cyn:#00cccc;--brd:rgba(255,255,255,0.04);--safe:env(safe-area-inset-bottom,0px)}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:calc(62px + var(--safe))}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confetti{0%{transform:translateY(-100vh) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes xpPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.8)}}
@keyframes lvlUp{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes breathe{0%,100%{box-shadow:0 0 15px rgba(255,34,85,0.15)}50%{box-shadow:0 0 30px rgba(255,34,85,0.35)}}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes spin{to{transform:rotate(360deg)}}

.page{display:none;padding:6px 16px 16px;animation:fadeUp .3s ease}.page.active{display:block}

/* HEADER */
.hdr{padding:10px 16px 6px;padding-top:calc(10px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:100;background:rgba(8,8,24,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--brd)}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--red),var(--org));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-date{font-size:10px;color:var(--tx2);margin-top:1px}
.hdr-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--brd);background:var(--card);color:var(--tx2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.hdr-btn:active{transform:scale(.88)}

/* XP BAR */
.xp-wrap{margin-top:6px;display:flex;align-items:center;gap:6px}
.xp-lvl{background:linear-gradient(135deg,var(--red),var(--org));color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;min-width:36px;text-align:center}
.xp-track{flex:1;height:5px;background:var(--card);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--org));transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.xp-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);background-size:200% 100%;animation:shimmer 2s infinite}
.xp-txt{font-size:9px;color:var(--tx3);white-space:nowrap}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,8,24,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:4px 0;padding-bottom:calc(4px + var(--safe));z-index:1000}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 5px;border:none;background:none;color:var(--tx3);font-size:8px;font-family:inherit;cursor:pointer;border-radius:6px;transition:all .2s;min-width:46px}
.nav-ic{font-size:19px;line-height:1;transition:transform .2s}
.nav-i.active{color:var(--red)}
.nav-i.active .nav-ic{transform:scale(1.15)}

/* STITLE */
.st{font-size:14px;font-weight:700;margin:14px 0 6px;display:flex;align-items:center;gap:5px}
.st .all{margin-left:auto;font-size:10px;color:var(--red);font-weight:500;cursor:pointer}

/* CARDS */
.crd{background:var(--card);border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid var(--brd);transition:all .12s;cursor:pointer;overflow:hidden}
.crd:active{transform:scale(.98);background:var(--card2)}
.crd-t{font-size:13px;font-weight:600;margin-bottom:2px}
.crd-s{font-size:11px;color:var(--tx2);line-height:1.3}

/* ADD BTN */
.abtn{width:100%;padding:10px;border-radius:10px;border:2px dashed rgba(255,34,85,.18);background:transparent;color:var(--red);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.abtn:active{background:rgba(255,34,85,.05);transform:scale(.98)}

/* QUOTE */
.qw{background:linear-gradient(135deg,#12082a,#20083a);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid rgba(170,100,255,.1);position:relative;overflow:hidden}
.qw::before{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(170,100,255,.08),transparent);pointer-events:none}
.qt{font-size:12px;font-weight:500;line-height:1.5;font-style:italic;position:relative}
.qa{font-size:10px;color:var(--prp);margin-top:5px;font-weight:600}
.qr-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.05);border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--tx3)}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.sc{background:var(--card);border-radius:10px;padding:8px;border:1px solid var(--brd);text-align:center}
.sv{font-size:20px;font-weight:800}
.sl{font-size:8px;color:var(--tx3);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}

/* TAGS */
.tg{display:inline-block;padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700}
.tg-health{background:rgba(0,221,102,.1);color:var(--grn)}
.tg-finance{background:rgba(255,204,0,.1);color:var(--ylw)}
.tg-relationship{background:rgba(255,34,85,.1);color:var(--red)}
.tg-career{background:rgba(51,136,255,.1);color:var(--blu)}
.tg-growth{background:rgba(170,102,255,.1);color:var(--prp)}
.tg-other{background:rgba(255,255,255,.04);color:var(--tx2)}

/* HABIT */
.hi{display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);border-radius:10px;border:1px solid var(--brd);margin-bottom:4px;transition:all .12s}
.hi:active{transform:scale(.98)}
.hc{width:26px;height:26px;border-radius:50%;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:12px}
.hc.dn{background:var(--grn);border-color:var(--grn);color:var(--bg)}
.hn{flex:1;font-size:12px;font-weight:500}
.hk{font-size:9px;color:var(--ylw);font-weight:700}
.hx{font-size:8px;color:var(--cyn);font-weight:600}

/* GOAL PROG */
.gp{width:100%;height:4px;background:var(--bg);border-radius:2px;margin-top:6px;overflow:hidden}
.gpb{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--red2));transition:width .5s ease}
.gm{display:flex;justify-content:space-between;margin-top:2px;font-size:9px;color:var(--tx3)}

/* AFF */
.af{background:linear-gradient(135deg,#10062a,#1e083a);border-radius:12px;padding:12px;margin-bottom:5px;border:1px solid rgba(170,100,255,.08);position:relative;overflow:hidden}
.aft{font-size:12px;font-weight:500;line-height:1.4;position:relative;padding-left:10px}
.aft::before{content:'\201C';font-size:24px;color:var(--prp);position:absolute;top:-4px;left:-2px;opacity:.3}
.afa{display:flex;gap:4px;margin-top:6px;position:relative}
.afa button{padding:3px 8px;border-radius:5px;border:none;font-size:9px;font-family:inherit;cursor:pointer;background:rgba(255,255,255,.04);color:var(--tx2)}

/* ROUTINE */
.ri{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:10px;margin-bottom:4px;border:1px solid var(--brd)}
.rt{font-size:11px;font-weight:700;min-width:40px}
.rt.mrn{color:var(--ylw)}.rt.day{color:var(--org)}.rt.evn{color:var(--prp)}.rt.nit{color:var(--blu)}
.rd{flex:1;font-size:12px}
.tgl{width:38px;height:22px;border-radius:11px;background:var(--tx3);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--grn)}
.tgl::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.tgl.on::after{transform:translateX(16px)}

/* REMINDER */
.rmi{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:10px;margin-bottom:4px;border:1px solid var(--brd)}
.rm-i{flex:1}.rm-t{font-size:12px;font-weight:500}.rm-t2{font-size:9px;color:var(--tx3)}

/* JOURNAL */
.je{padding:10px;background:var(--card);border-radius:10px;margin-bottom:5px;border:1px solid var(--brd)}
.jd{font-size:9px;color:var(--tx3);margin-bottom:2px}
.jt{font-size:12px;line-height:1.3;color:var(--tx2)}

/* DAILY BONUS */
.db{background:linear-gradient(135deg,#1a0808,#2a1010);border:1px solid rgba(255,34,85,.15);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:8px;cursor:pointer;animation:breathe 3s infinite}
.db:active{transform:scale(.97)}
.db-i{font-size:24px;animation:pulse 2s infinite}
.db-t{flex:1}.db-tt{font-size:12px;font-weight:600;color:var(--red)}.db-ts{font-size:10px;color:var(--tx2)}
.db-b{padding:5px 12px;border-radius:6px;border:none;background:var(--red);color:#fff;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer}

/* ACHIEVEMENTS */
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.ai{text-align:center;padding:8px 2px;border-radius:8px;background:var(--card);border:1px solid var(--brd)}
.ai.lk{opacity:.25}.ai.ul{border-color:rgba(255,204,0,.2);background:rgba(255,204,0,.03)}
.ai-i{font-size:20px;margin-bottom:1px}.ai-n{font-size:7px;color:var(--tx2);line-height:1.1}

/* REVIEW */
.rv-h{text-align:center;padding:8px 0 12px}
.rv-h .e{font-size:40px;margin-bottom:6px}
.rv-h h2{font-size:18px;font-weight:700}
.rv-h p{font-size:12px;color:var(--tx2);margin-top:3px}
.rv-s{margin-bottom:10px}
.rv-s label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:600}
.rv-s textarea,.rv-s input[type=text]{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit;outline:none}
.rv-s textarea{min-height:50px;resize:none}
.rv-s textarea:focus,.rv-s input:focus{border-color:var(--red)}

/* ANALYTICS */
.ap{display:flex;gap:4px;margin-bottom:10px}
.apb{flex:1;padding:6px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--tx2);font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .12s}
.apb.act{background:var(--red);color:#fff;border-color:var(--red)}
.ac{background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--brd);margin-bottom:6px}
.ac-t{font-size:11px;font-weight:600;margin-bottom:4px;color:var(--tx2)}
.abr{display:flex;align-items:flex-end;gap:2px;height:70px}
.abc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.ab{width:100%;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--red),var(--red2));min-height:2px;transition:height .5s ease}
.abv{font-size:7px;color:var(--tx2);font-weight:600}
.abl{font-size:7px;color:var(--tx3)}
.ar{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--brd)}
.ar:last-child{border-bottom:none}
.arl{font-size:11px;color:var(--tx2)}.arv{font-size:12px;font-weight:700}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;justify-content:center;align-items:flex-end}
.mo.act{display:flex;animation:fadeUp .2s ease}
.ml{background:var(--bg2);border-radius:18px 18px 0 0;padding:12px;padding-bottom:calc(12px + var(--safe));width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.mh{width:32px;height:3px;background:var(--tx3);border-radius:2px;margin:0 auto 10px}
.ml h2{font-size:16px;font-weight:700;margin-bottom:10px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--red)}
.fg textarea{min-height:56px;resize:vertical}
.ma{display:flex;gap:6px;margin-top:10px}
.bt{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .12s}
.bt:active{transform:scale(.97)}
.bt-p{background:var(--red);color:#fff}
.bt-s{background:var(--card);color:var(--tx2)}

/* SETTINGS */
.si{display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);border-radius:8px;margin-bottom:4px;border:1px solid var(--brd);cursor:pointer;transition:all .12s}
.si:active{transform:scale(.98)}
.si-i{font-size:18px}.si-l{flex:1;font-size:12px;font-weight:500}.si-h{font-size:9px;color:var(--tx3)}

/* EMPTY */
.emp{text-align:center;padding:20px 12px;color:var(--tx3)}
.emp .e{font-size:32px;margin-bottom:6px}
.emp p{font-size:11px;line-height:1.3}

.db2{padding:2px 6px;border-radius:4px;border:none;background:rgba(255,34,85,.08);color:var(--red);font-size:9px;font-family:inherit;cursor:pointer}

/* XP POPUP */
.xpp{position:fixed;z-index:9998;pointer-events:none;font-size:15px;font-weight:800;color:var(--cyn);animation:xpPop 1s ease-out forwards;text-shadow:0 0 8px rgba(0,204,204,.5)}
/* CONFETTI */
.cfp{position:fixed;border-radius:2px;z-index:9999;pointer-events:none;animation:confetti 2.5s ease-in forwards}
/* LEVEL UP */
.luo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;justify-content:center;align-items:center;flex-direction:column}
.luo.act{display:flex}
.lu-t{font-size:42px;font-weight:900;background:linear-gradient(135deg,var(--ylw),var(--org),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:lvlUp .6s ease}
.lu-s{font-size:14px;color:var(--tx2);margin-top:6px;animation:fadeUp .5s ease .3s both}
.lu-b{margin-top:16px;padding:10px 36px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;animation:fadeUp .5s ease .5s both}
/* NOTIF */
.ntf{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px;padding-top:calc(8px + env(safe-area-inset-top,0px));background:linear-gradient(135deg,var(--red),#cc1144);color:#fff;z-index:3000;display:none;text-align:center;font-size:12px;font-weight:600}
.ntf.act{display:block;animation:fadeUp .3s ease}

/* STEPS */
.sli{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--brd);font-size:11px}
.sli:last-child{border-bottom:none}
.sck{width:18px;height:18px;border-radius:4px;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:9px}
.sck.dn{background:var(--grn);border-color:var(--grn);color:var(--bg)}
.stx{flex:1}.stx.dt{text-decoration:line-through;opacity:.4}
.sdl{color:var(--tx3);cursor:pointer;font-size:12px}
.qas{display:flex;gap:4px;margin-top:4px}
.qas input{flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--brd);background:var(--bg);color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.qas button{padding:6px 10px;border-radius:6px;border:none;background:var(--red);color:#fff;font-size:11px;font-family:inherit;cursor:pointer}

.ovq{font-style:italic;color:var(--tx2);font-size:11px;padding:8px;background:var(--card);border-radius:8px;border-left:2px solid var(--prp);margin-bottom:6px;line-height:1.3}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="ntf" id="ntf"></div>
<div class="luo" id="luOv"><div class="lu-t" id="luT">LEVEL 2!</div><div class="lu-s" id="luS">Ты становишься сильнее</div><button class="lu-b" onclick="document.getElementById('luOv').classList.remove('act')">Продолжить</button></div>

<div class="app">
<div class="hdr">
<div class="hdr-row">
<div><h1>⚡ Моя Жизнь</h1><div class="hdr-date" id="hDate"></div></div>
<div style="display:flex;gap:5px"><button class="hdr-btn" onclick="openReview()">🌅</button><button class="hdr-btn" onclick="openSettings()">⚙️</button></div>
</div>
<div class="xp-wrap"><div class="xp-lvl" id="xLvl">Ур.1</div><div class="xp-track"><div class="xp-fill" id="xBar" style="width:0%"></div></div><div class="xp-txt" id="xTxt">0 XP</div></div>
</div>

<div class="page active" id="pg-home"><div id="homeC"></div></div>
<div class="page" id="pg-goals"><div class="st"><span>🎯</span> Мои цели</div><div id="goalsC"></div><button class="abtn" onclick="openGoalM()">+ Добавить цель</button></div>
<div class="page" id="pg-habits"><div class="st"><span>✅</span> Привычки</div><div id="habitsC"></div><div style="margin-top:6px"><button class="abtn" onclick="openHabitM()">+ Добавить привычку</button></div></div>
<div class="page" id="pg-mind">
<div class="st"><span>🧠</span> Установки</div><div id="affC"></div><button class="abtn" onclick="openAffM()">+ Добавить установку</button>
<div class="st"><span>⏰</span> Напоминания</div><div id="remC"></div><button class="abtn" onclick="openRemM()" style="margin-top:6px">+ Напоминание</button>
<div class="st"><span>📔</span> Дневник</div><div id="journC"></div><button class="abtn" onclick="openJournM()" style="margin-top:6px">+ Записать мысль</button>
</div>
<div class="page" id="pg-stats"><div class="st" style="margin-top:4px"><span>📊</span> Статистика</div><div class="ap"><button class="apb act" id="pw" onclick="setPer('week')">Неделя</button><button class="apb" id="pm" onclick="setPer('month')">Месяц</button></div><div id="statsC"></div></div>

<div class="nav">
<button class="nav-i active" onclick="goPage('home')" data-p="home"><span class="nav-ic">🏠</span><span>Главная</span></button>
<button class="nav-i" onclick="goPage('goals')" data-p="goals"><span class="nav-ic">🎯</span><span>Цели</span></button>
<button class="nav-i" onclick="goPage('habits')" data-p="habits"><span class="nav-ic">✅</span><span>Привычки</span></button>
<button class="nav-i" onclick="goPage('mind')" data-p="mind"><span class="nav-ic">🧠</span><span>Разум</span></button>
<button class="nav-i" onclick="goPage('stats')" data-p="stats"><span class="nav-ic">📊</span><span>Стата</span></button>
</div>
</div>

<div class="mo" id="mOv" onclick="cModal(event)">
<div class="ml"><div class="mh"></div><div id="mBd"></div></div>
</div>
<input type="file" id="impF" accept=".json" style="display:none" onchange="impData(event)">

<script>
// ========== QUOTES ==========

// ========== XP SYSTEM ==========
var XPR={habit:15,step:10,journal:20,routine:5,goal:25,affirmation:10,review:30,daily:50};
var XPLV=[0,50,120,220,350,520,730,1000,1350,1800,2400,3200,4200,5500,7000,9000,11500,14500,18000,22000,27000];

function gXP(){try{var r=localStorage.getItem("ml_xp");if(r)return JSON.parse(r)}catch(e){}return{total:0,today:0,lastDate:"",achs:[],dailyDate:""}}
function sXP(x){localStorage.setItem("ml_xp",JSON.stringify(x))}
var xpD=gXP();

function getLv(t){var l=1;for(var i=0;i<XPLV.length;i++){if(t>=XPLV[i])l=i+1}return l}
function getLvP(t){var l=getLv(t);var c=XPLV[l-1]||0;var n=XPLV[l]||(XPLV[XPLV.length-1]+5000);return{level:l,curr:t-c,need:n-c,pct:Math.round((t-c)/(n-c)*100)}}

function addXP(amt,px,py){
    var oldLv=getLv(xpD.total);
    xpD.total+=amt;
    var td=today();
    if(xpD.lastDate!==td){xpD.today=0;xpD.lastDate=td}
    xpD.today+=amt;
    sXP(xpD);
    renderXP();
    showXPPop(amt,px,py);
    var newLv=getLv(xpD.total);
    if(newLv>oldLv){setTimeout(function(){showLvlUp(newLv)},800)}
    checkAchs();
}

function renderXP(){
    var p=getLvP(xpD.total);
    document.getElementById("xLvl").textContent="Ур."+p.level;
    document.getElementById("xBar").style.width=p.pct+"%";
    document.getElementById("xTxt").textContent=xpD.total+" XP";
}

function showXPPop(a,x,y){
    var el=document.createElement("div");
    el.className="xpp";
    el.textContent="+"+a+" XP";
    el.style.left=(x||(window.innerWidth/2))+"px";
    el.style.top=(y||180)+"px";
    document.body.appendChild(el);
    setTimeout(function(){el.remove()},1200);
}

function showLvlUp(lv){
    document.getElementById("luT").textContent="УРОВЕНЬ "+lv+"!";
    var ms=["Ты становишься сильнее 💪","Дисциплина — суперсила ⚡","Новая высота! 🏔️","Растешь! 🚀","Невероятно! 🔥","Неудержимый! 💎"];
    document.getElementById("luS").textContent=ms[Math.floor(Math.random()*ms.length)];
    document.getElementById("luOv").classList.add("act");
    spawnConf();
}

function spawnConf(){
    var colors=["#ff2255","#00dd66","#ffcc00","#3388ff","#aa66ff","#ff8800","#00cccc"];
    for(var i=0;i<35;i++){
        var c=document.createElement("div");
        c.className="cfp";
        c.style.left=Math.random()*100+"vw";
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDelay=Math.random()*0.5+"s";
        c.style.animationDuration=(2+Math.random()*1.5)+"s";
        c.style.width=(4+Math.random()*7)+"px";
        c.style.height=(4+Math.random()*7)+"px";
        document.body.appendChild(c);
        setTimeout(function(el){el.remove()},4000,c);
    }
}

function checkAchs(){
    var u=xpD.achs;
    function ul(id){if(u.indexOf(id)<0){u.push(id);sXP(xpD);showNtf("🏆 Достижение!")}}
    if(D.goals.length>=1)ul("fg");
    if(D.habits.length>=1)ul("fh");
    if(D.affirms.length>=1)ul("fa");
    if(D.journal.length>=1)ul("fj");
    if(D.routine.length>=1)ul("fr");
    if(D.goals.length>=5)ul("g5");
    if(D.journal.length>=10)ul("j10");
    if(xpD.total>=100)ul("x1");
    if(xpD.total>=500)ul("x5");
    var ms=0;
    D.habits.forEach(function(h){var s=getStr(h);if(s>ms)ms=s});
    if(ms>=3)ul("s3");
    if(ms>=7)ul("s7");
    if(ms>=30)ul("s30");
}

function loadD(){try{var r=localStorage.getItem("ml_data");if(r)return JSON.parse(r)}catch(e){}return{goals:[],habits:[],affirms:[],journal:[],routine:[],reminders:[]}}
function saveD(d){localStorage.setItem("ml_data",JSON.stringify(d))}
var D=loadD();

function today(){return new Date().toISOString().split("T")[0]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function fmtD(s){var d=new Date(s);var w=["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];var m=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];return w[d.getDay()]+", "+d.getDate()+" "+m[d.getMonth()]}
function fmtDF(s){var d=new Date(s);var w=["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];var m=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];return w[d.getDay()]+", "+d.getDate()+" "+m[d.getMonth()]+" "+d.getFullYear()}
function dayL(s){if(s===today())return"Сегодня";var y=new Date(Date.now()-864e5).toISOString().split("T")[0];if(s===y)return"Вчера";return fmtD(s)}
function catL(c){var m={health:"💪",finance:"💰",relationship:"❤️",career:"💼",growth:"📚",other:"📌"};return m[c]||"📌"}
function catN(c){var m={health:"Здоровье",finance:"Финансы",relationship:"Отношения",career:"Карьера",growth:"Развитие",other:"Другое"};return m[c]||"Другое"}
function getStr(h){if(!h.doneDates||!h.doneDates.length)return 0;var sorted=h.doneDates.slice().sort().reverse();var d=new Date();var s=0;for(var i=0;i<365;i++){var ds=d.toISOString().split("T")[0];if(sorted.indexOf(ds)>=0){s++;d.setDate(d.getDate()-1)}else{if(i===0){d.setDate(d.getDate()-1);continue}break}}return s}
function timeC(t){if(!t)return"";var h=parseInt(t);if(h>=5&&h<12)return"mrn";if(h>=12&&h<17)return"day";if(h>=17&&h<21)return"evn";return"nit"}

function goPage(p){
    var pages=document.querySelectorAll(".page");
    for(var i=0;i<pages.length;i++)pages[i].classList.remove("active");

}

    var days=aPer==="week"?7:30;
    var td=new Date();var dates=[];
    for(var i=days-1;i>=0;i--){var d=new Date(td);d.setDate(d.getDate()-i);dates.push(d.toISOString().split("T")[0])}

    var hD=dates.map(function(d){return{date:d,done:D.habits.filter(function(h){return h.doneDates&&h.doneDates.indexOf(d)>=0}).length,total:D.habits.length}});
    var hAvg=D.habits.length?Math.round(hD.reduce(function(a,d){return a+d.done},0)/(hD.length*D.habits.length)*100):0;
    var rD=dates.map(function(d){return{date:d,done:D.routine.filter(function(r){return r.doneDates&&r.doneDates.indexOf(d)>=0}).length,total:D.routine.length}});
    var rAvg=D.routine.length?Math.round(rD.reduce(function(a,d){return a+d.done},0)/(rD.length*D.routine.length)*100):0;
    var jC=dates.reduce(function(a,d){return a+D.journal.filter(function(j){return j.date===d}).length},0);
    var tS=D.goals.reduce(function(a,g){return a+(g.steps||[]).length},0);
    var dS=D.goals.reduce(function(a,g){return a+(g.steps||[]).filter(function(s){return s.done}).length},0);
    var gP=tS>0?Math.round(dS/tS*100):0;

    var cD=aPer==="week"?hD:hD.filter(function(_,i){return i%Math.ceil(days/7)===0||i===days-1}).slice(-7);
    var hCh="";
    cD.forEach(function(d){
        var p=d.total>0?(d.done/d.total*100):0;
        var lb=aPer==="week"?["Вс","Пн","Вт","Ср","Чт","Пт","Сб"][new Date(d.date+"T12:00").getDay()]:fmtD(d.date);
        hCh+='<div class="abc"><div class="abv">'+d.done+"/"+d.total+'</div><div class="ab" style="height:'+Math.max(p,2)+'%"></div><div class="abl">'+lb+'</div></div>';
    });

    var rcD=aPer==="week"?rD:rD.filter(function(_,i){return i%Math.ceil(days/7)===0||i===days-1}).slice(-7);
    var rCh="";
    rcD.forEach(function(d){
        var p=d.total>0?(d.done/d.total*100):0;
        var lb=aPer==="week"?["Вс","Пн","Вт","Ср","Чт","Пт","Сб"][new Date(d.date+"T12:00").getDay()]:fmtD(d.date);
        rCh+='<div class="abc"><div class="abv">'+d.done+"/"+d.total+'</div><div class="ab" style="height:'+Math.max(p,2)+'%;background:linear-gradient(to top,var(--grn),var(--cyn))"></div><div class="abl">'+lb+'</div></div>';
    });

    var streaks=D.habits.map(function(h){return{t:h.title,s:getStr(h)}}).sort(function(a,b){return b.s-a.s});

    var h="";
    h+='<div class="ac"><div style="font-size:12px;font-weight:700;margin-bottom:6px">📋 Прогресс</div>';
    h+='<div class="ar"><div class="arl">🎯 Цели</div><div class="arv" style="color:var(--red)">'+dS+"/"+tS+" ("+gP+"%)</div></div>";
    h+='<div class="ar"><div class="arl">✅ Привычки</div><div class="arv" style="color:var(--grn)">'+hAvg+"%</div></div>";
    h+='<div class="ar"><div class="arl">📅 Режим</div><div class="arv" style="color:var(--blu)">'+rAvg+"%</div></div>";
    h+='<div class="ar"><div class="arl">📔 Записей</div><div class="arv" style="color:var(--prp)">'+jC+"</div></div>";
    h+='<div class="ar"><div class="arl">⭐ Всего XP</div><div class="arv" style="color:var(--cyn)">'+xpD.total+"</div></div>";
    h+="</div>";

    if(D.habits.length){h+='<div class="ac"><div class="ac-t">✅ Привычки</div><div class="abr">'+hCh+"</div></div>"}
    if(D.routine.length){h+='<div class="ac"><div class="ac-t">📅 Режим</div><div class="abr">'+rCh+"</div></div>"}

    if(streaks.some(function(x){return x.s>0})){
        h+='<div class="ac"><div style="font-size:12px;font-weight:700;margin-bottom:4px">🔥 Серии</div>';
        streaks.filter(function(x){return x.s>0}).forEach(function(x){
            h+='<div class="ar"><div class="arl">'+x.t+'</div><div class="arv" style="color:var(--ylw)">🔥 '+x.s+"</div></div>";
        });
        h+="</div>";
    }

    var moods=D.journal.filter(function(j){return j.mood}).map(function(j){return j.mood});
    if(moods.length){
        var mc={};moods.forEach(function(m){mc[m]=(mc[m]||0)+1});
        var top=Object.keys(mc).sort(function(a,b){return mc[b]-mc[a]})[0];
        h+='<div class="ac"><div style="font-size:12px;font-weight:700;margin-bottom:4px">🎭 Настроение</div>';
        h+='<div class="ar"><div class="arl">Частое</div><div class="arv">'+top+" (×"+mc[top]+")</div></div></div>";
    }

    el.innerHTML=h;
}

// ========== REVIEW ==========
function openReview(){
    var td=today();var hr=new Date().getHours();var isM=hr<14;
    var ex=D.journal.filter(function(j){return j.date===td&&j.isRev})[0];
    var rd=ex?JSON.parse(ex.revData||"{}"):{};

    var h='<div class="rv-h">';

    h+='<h2>'+(isM?"Утренний обзор":"Вечерний обзор")+'</h2>';
    h+='<p>'+(isM?"Настрой свой день":"Оцени прошедший день")+'</p></div>';

    if(isM){
        h+='<div class="rv-s"><label>🙏 За что я благодарен?</label><textarea id="rvG" placeholder="3 вещи...">'+(rd.grateful||"")+'</textarea></div>';
        h+='<div class="rv-s"><label>🎯 Главная задача дня</label><input type="text" id="rvM" placeholder="Одно самое важное дело" value="'+(rd.main||"")+'"></div>';
        h+='<div class="rv-s"><label>💡 Установка на сегодня</label><textarea id="rvA" placeholder="Кем я буду сегодня?">'+(rd.affirmation||"")+'</textarea></div>';

        h+='<div class="rv-s"><label>⭐ Что прошло хорошо?</label><textarea id="rvGd" placeholder="Поблагодари себя">'+(rd.good||"")+'</textarea></div>';
        h+='<div class="rv-s"><label>🔄 Что улучшить?</label><textarea id="rvIm" placeholder="Без осуждения — только рост">'+(rd.improve||"")+'</textarea></div>';
        h+='<div class="rv-s"><label>💪 Чем горжусь?</label><textarea id="rvPr" placeholder="Даже мелочи важны">'+(rd.proud||"")+'</textarea></div>';
    }

    h+='<div class="ma">';
    h+='<button class="bt bt-s" onclick="closeM()">Пропустить</button>';
    h+='<button class="bt bt-p" onclick="saveRev()">Сохранить +'+XPR.review+" XP</button></div>";

function saveRev(){
    var td=today();var hr=new Date().getHours();var isM=hr<14;
    var rd={};
    if(isM){
        rd.grateful=document.getElementById("rvG").value;
        rd.main=document.getElementById("rvM").value;
        rd.affirmation=document.getElementById("rvA").value;
    }else{
        rd.good=document.getElementById("rvGd").value;
        rd.improve=document.getElementById("rvIm").value;
        rd.proud=document.getElementById("rvPr").value;
    }
    var ex=D.journal.filter(function(j){return j.date===td&&j.isRev})[0];
    if(ex){ex.text=isM?"🌅 Утренний обзор":"🌙 Вечерний обзор";ex.revData=JSON.stringify(rd)}
    else{D.journal.push({id:uid(),text:isM?"🌅 Утренний обзор":"🌙 Вечерний обзор",mood:"",date:td,time:new Date().getHours().toString().padStart(2,"0")+":"+new Date().getMinutes().toString().padStart(2,"0"),isRev:true,revData:JSON.stringify(rd)})}
    saveD(D);
    addXP(XPR.review,window.innerWidth/2,200);
    closeM();renderAll();
    showNtf(isM?"🌅 Утро настроено!":"🌙 Обзор сохранён!");
}

function addGoal(){
    var t=document.getElementById("gT").value.trim();if(!t)return;
    D.goals.push({id:uid(),title:t,description:document.getElementById("gD").value.trim(),category:document.getElementById("gC").value,steps:[],createdAt:today()});
    saveD(D);closeM();renderAll();addXP(XPR.goal,window.innerWidth/2,300);showNtf("🎯 Цель создана!");
}
function delGoal(id){if(!confirm("Удалить цель?"))return;D.goals=D.goals.filter(function(g){return g.id!==id});saveD(D);renderAll()}

function openGD(id){
    var g=D.goals.filter(function(x){return x.id===id})[0];if(!g)return;
    var sh="";
    (g.steps||[]).forEach(function(s,i){
        sh+='<div class="sli">';
        sh+='<div class="sck '+(s.done?"dn":"")+'" onclick="togStep(\''+id+"',"+i+',event)">'+(s.done?"✓":"")+"</div>";
        sh+='<div class="stx '+(s.done?"dt":"")+'">'+s.text+'</div>';
        sh+='<div class="sdl" onclick="delStep(\''+id+"',"+i+')">✕</div>';
        sh+="</div>";
    });
    openM('<h2>'+g.title+'</h2>'+
    (g.description?'<p style="color:var(--tx2);font-size:11px;margin-bottom:6px">'+g.description+"</p>":"")+
    '<div class="st" style="margin-top:0"><span>📋</span> Шаги</div>'+
    '<div>'+sh+'</div>'+
    '<div class="qas"><input type="text" id="nsT" placeholder="Новый шаг..."><button onclick="addStep(\''+id+"')\">+</button></div>"+
    '<div class="ma"><button class="bt bt-s" onclick="closeM()">Закрыть</button></div>');
}
function addStep(gid){
    var t=document.getElementById("nsT").value.trim();if(!t)return;
    var g=D.goals.filter(function(x){return x.id===gid})[0];
    if(!g.steps)g.steps=[];
    g.steps.push({text:t,done:false});saveD(D);openGD(gid);renderAll();
}
function togStep(gid,i,e){
    var g=D.goals.filter(function(x){return x.id===gid})[0];
    g.steps[i].done=!g.steps[i].done;saveD(D);
    if(g.steps[i].done){var r=e.target.getBoundingClientRect();addXP(XPR.step,r.left+r.width/2,r.top)}
    openGD(gid);renderAll();
}
function delStep(gid,i){
    var g=D.goals.filter(function(x){return x.id===gid})[0];
    g.steps.splice(i,1);saveD(D);openGD(gid);renderAll();
}

    openM('<h2>Записать мысль</h2>'+

function expData(){
    var blob=new Blob([JSON.stringify({appData:D,xpData:xpD},null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="mylife_"+today()+".json";a.click();
    URL.revokeObjectURL(url);showNtf("💾 Бэкап скачан!");
}
function impData(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
        try{
            var d=JSON.parse(ev.target.result);
            if(d.appData){D=d.appData;if(!D.reminders)D.reminders=[];if(!D.affirms)D.affirms=[];if(d.xpData){xpD=d.xpData;sXP(xpD)}saveD(D);renderAll();renderXP();showNtf("📂 Восстановлено!")}
            else showNtf("❌ Неверный формат");
        }catch(err){showNtf("❌ Ошибка")}
    };
    r.readAsText(f);e.target.value="";
}

function openRutMgr(){
    closeM();
    var sorted=D.routine.slice().sort(function(a,b){return(a.time||"").localeCompare(b.time||"")});
    var h="";
    sorted.forEach(function(r){
        h+='<div class="ri"><div class="rt '+timeC(r.time)+'">'+(r.time||"—")+'</div><div class="rd">'+r.title+'</div><button class="db2" onclick="delRut(\''+r.id+"');openRutMgr()\">✕</button></div>";
    });
    setTimeout(function(){
        openM('<h2>📅 Режим дня</h2><div id="rutMgr">'+(h||'<div class="emp" style="padding:10px"><p>Пусто</p></div>')+'</div>'+
        '<div style="margin-top:6px"><div class="fg"><label>Время</label><input type="time" id="nrT"></div>'+
        '<div class="fg"><label>Что делаем</label><input type="text" id="nrTl" placeholder="Например: Пробежка"></div>'+
        '<button class="bt bt-p" style="width:100%" onclick="addRutMgr()">Добавить</button></div>'+
        '<div class="ma"><button class="bt bt-s" onclick="closeM();renderAll()">Готово</button></div>');
    },350);
}
function addRutMgr(){
    var t=document.getElementById("nrTl").value.trim();if(!t)return;
    D.routine.push({id:uid(),title:t,time:document.getElementById("nrT").value,doneDates:[]});
    saveD(D);addXP(XPR.routine,window.innerWidth/2,300);openRutMgr();
}
function delRut(id){D.routine=D.routine.filter(function(x){return x.id!==id});saveD(D)}

function reqNotif(){if(!("Notification" in window)){showNtf("Не поддерживается");return}Notification.requestPermission().then(function(p){showNtf(p==="granted"?"🔔 Включено!":"Отклонено")})}

setInterval(function(){
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    var now=new Date();var ct=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
    var td=today();
    D.reminders.forEach(function(r){
        if(!r.active||!r.time||r.time!==ct)return;
        if(!r.lastFired||r.lastFired!==td+"_"+ct){
            new Notification("⚡ Моя Жизнь",{body:r.text,tag:r.id});
            r.lastFired=td+"_"+ct;saveD(D);
        }
    });
},60000);

function renderAll(){renderHome();renderGoals();renderHabits();renderAff();renderRem();renderJourn();renderStats()}
renderAll();renderXP();checkAchs();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(function(){});
